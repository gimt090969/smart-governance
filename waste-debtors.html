<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลูกหนี้ค้างชำระ - GOOD GOV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .bg-orange{background:#ea580c !important;}
        .year-btn { border-radius: 20px !important; font-weight: 600; font-size: 0.82rem; padding: 4px 16px; }
        .year-btn.active { background: linear-gradient(135deg, #1a56db, #3b82f6) !important; border-color: #1a56db !important; color: #fff !important; }
    </style>
</head>
<body>
<nav id="sidebar"></nav>
<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="ระบบลูกหนี้ค้างชำระค่าธรรมเนียมขยะ"></div>
    <div class="page-content">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-user-clock text-danger me-2"></i>ลูกหนี้ค้างชำระ</h4>
                <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                    <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none">แดชบอร์ด</a></li>
                    <li class="breadcrumb-item"><a href="finance.html" class="text-decoration-none">กองคลัง</a></li>
                    <li class="breadcrumb-item"><a href="waste-dashboard.html" class="text-decoration-none">ค่าธรรมเนียมขยะ</a></li>
                    <li class="breadcrumb-item active">ลูกหนี้ค้างชำระ</li>
                </ol></nav>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-primary" onclick="printAllDebtLetters()"><i class="fa-solid fa-print me-1"></i>พิมพ์ทวงหนี้ทั้งหมด</button>
                <button class="btn btn-sm btn-outline-danger" onclick="showToast('ส่งแจ้งเตือนทั้งหมดแล้ว','success')"><i class="fa-brands fa-line me-1"></i>แจ้งเตือนทั้งหมด</button>
                <button class="btn btn-sm btn-outline-success" onclick="showToast('Export Excel สำเร็จ','success')"><i class="fa-solid fa-file-excel me-1"></i>Export</button>
                <button class="btn btn-sm btn-outline-secondary" onclick="showToast('Export PDF สำเร็จ','success')"><i class="fa-solid fa-file-pdf me-1"></i>PDF</button>
            </div>
        </div>

        <!-- Year Selector -->
        <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
            <span class="fw-semibold text-muted" style="font-size:0.85rem;"><i class="fa-solid fa-calendar-days me-1"></i>ปีงบประมาณ:</span>
            <div class="btn-group" id="yearBtnGroup" role="group"></div>
        </div>

        <!-- Summary Cards -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-3"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">ลูกหนี้ทั้งหมด</div><div class="kpi-value text-danger" id="debtTotal">-</div></div><div class="kpi-icon bg-danger bg-opacity-10 text-danger"><i class="fa-solid fa-users"></i></div></div></div></div>
            <div class="col-6 col-lg-3"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">ยอดค้างรวม (บาท)</div><div class="kpi-value text-danger" id="debtAmount">-</div></div><div class="kpi-icon bg-danger bg-opacity-10 text-danger"><i class="fa-solid fa-coins"></i></div></div></div></div>
            <div class="col-6 col-lg-3"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">ค้าง 1-2 เดือน</div><div class="kpi-value text-warning" id="debt12">-</div></div><div class="kpi-icon bg-warning bg-opacity-10 text-warning"><i class="fa-solid fa-clock"></i></div></div></div></div>
            <div class="col-6 col-lg-3"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">ค้างเกิน 6 เดือน</div><div class="kpi-value text-danger" id="debt6plus">-</div></div><div class="kpi-icon bg-danger bg-opacity-10 text-danger"><i class="fa-solid fa-triangle-exclamation"></i></div></div></div></div>
        </div>

        <!-- Filters -->
        <div class="card mb-4">
            <div class="card-body py-3">
                <div class="row g-2 align-items-center">
                    <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="debtSearch" placeholder="ค้นหาชื่อ / บ้านเลขที่..." oninput="renderDebtors()"></div>
                    <div class="col-md-3"><select class="form-select form-select-sm" id="debtFilter" onchange="renderDebtors()"><option value="">ทุกระดับ</option><option value="1-2">ค้าง 1-2 เดือน</option><option value="3-6">ค้าง 3-6 เดือน</option><option value="6+">เกิน 6 เดือน</option></select></div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr>
                            <th class="ps-4">บ้านเลขที่</th><th>ชื่อเจ้าบ้าน</th><th>เดือนค้าง</th>
                            <th class="text-end">ยอดค้าง</th><th>ชำระล่าสุด</th><th>เบอร์โทร</th><th>ระดับ</th><th class="pe-4 text-center">จัดการ</th>
                        </tr></thead>
                        <tbody id="debtorTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/waste.js"></script>
<script src="assets/js/responsive.js"></script>
<script>
let debtorSelectedYear = '';

document.addEventListener('DOMContentLoaded', async function() {
    Swal.fire({title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
    initWasteData();
    await fetchWasteFeeTypes();
    await fetchWasteCustomers();
    await fetchMonthlyStatus();
    initYearSelector();
    renderDebtors();
    Swal.close();
});

function initYearSelector() {
    const ms = getMonthlyStatus();
    const cy = getCurrentFiscalYear();
    const cyNum = parseInt(cy);
    const yearSet = new Set([String(cyNum - 1), cy, String(cyNum + 1)]);
    Object.values(ms).forEach(customerYears => {
        Object.keys(customerYears).forEach(y => yearSet.add(y));
    });
    const customYears = getWasteData('customYears');
    if (Array.isArray(customYears)) customYears.forEach(y => yearSet.add(y));

    const years = Array.from(yearSet).sort();
    debtorSelectedYear = cy;

    const btnGroup = document.getElementById('yearBtnGroup');
    btnGroup.innerHTML = years.map(y =>
        `<button type="button" class="btn btn-sm year-btn ${y === debtorSelectedYear ? 'active btn-primary' : 'btn-outline-secondary'}" onclick="selectYear('${y}', this)">${y}</button>`
    ).join('');
}

function selectYear(year, btn) {
    debtorSelectedYear = year;
    document.querySelectorAll('#yearBtnGroup .year-btn').forEach(b => {
        b.classList.remove('active', 'btn-primary');
        b.classList.add('btn-outline-secondary');
    });
    btn.classList.remove('btn-outline-secondary');
    btn.classList.add('active', 'btn-primary');
    renderDebtors();
}

function renderDebtors() {
    const year = debtorSelectedYear || getCurrentFiscalYear();
    let debtors = calculateDebtors(year);
    const q = (document.getElementById('debtSearch').value||'').toLowerCase();
    const f = document.getElementById('debtFilter').value;
    if (q) debtors = debtors.filter(d => d.name.toLowerCase().includes(q) || d.house_no.includes(q));
    if (f === '1-2') debtors = debtors.filter(d => d.unpaid_count <= 2);
    else if (f === '3-6') debtors = debtors.filter(d => d.unpaid_count >= 3 && d.unpaid_count <= 6);
    else if (f === '6+') debtors = debtors.filter(d => d.unpaid_count > 6);

    document.getElementById('debtTotal').textContent = debtors.length;
    document.getElementById('debtAmount').textContent = formatMoney(debtors.reduce((s,d) => s + d.total_debt, 0));
    document.getElementById('debt12').textContent = debtors.filter(d => d.unpaid_count <= 2).length;
    document.getElementById('debt6plus').textContent = debtors.filter(d => d.unpaid_count > 6).length;

    const tbody = document.getElementById('debtorTableBody');
    tbody.innerHTML = debtors.length ? debtors.map(d => `<tr>
        <td class="ps-4 fw-bold">${d.house_no} ม.${d.moo}</td>
        <td>${d.name}</td>
        <td class="fw-semibold text-danger">${d.unpaid_count} เดือน<div class="text-xs text-muted fw-normal">${d.unpaid_months.join(', ')}</div></td>
        <td class="text-end fw-bold text-danger">฿${formatMoney(d.total_debt)}</td>
        <td class="text-xs text-muted">${d.last_paid}</td>
        <td class="text-xs">${d.phone||'-'}</td>
        <td><span class="badge ${getDebtBadgeClass(d.unpaid_count)}">${getDebtBadgeLabel(d.unpaid_count)}</span></td>
        <td class="pe-4 text-center">
            <button class="btn btn-xs btn-outline-warning me-1" onclick="showToast('ส่งแจ้งเตือน ${d.name}','success')" title="แจ้งเตือน"><i class="fa-solid fa-bell"></i></button>
            <button class="btn btn-xs btn-outline-secondary" onclick="printDebtLetter('${d.id}')" title="พิมพ์ทวงหนี้"><i class="fa-solid fa-print"></i></button>
        </td>
    </tr>`).join('') : '<tr><td colspan="8" class="text-center py-4 text-muted">ไม่มีลูกหนี้ค้างชำระ</td></tr>';
}
</script>
<script src="assets/js/waste-debt-letter.js"></script>
</body>
</html>
