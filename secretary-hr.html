<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>งานบุคลากร - ระบบบริหารจัดการเทศบาลอัจฉริยะ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
    </style>
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="bg-slate-50">

<nav id="sidebar"></nav>

<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="งานบุคลากร (HR Management)"></div>

    <div class="page-content p-4">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">งานบุคลากร</h1>
                <nav class="flex text-xs text-slate-500 mt-1">
                    <a href="secretary.html" class="hover:text-blue-600 transition">สำนักปลัด</a>
                    <span class="mx-2">/</span>
                    <span class="text-slate-800">งานบุคลากร</span>
                </nav>
            </div>
            <button onclick="openAddEmpModal()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-emerald-700 transition shadow-md">
                <i class="fa-solid fa-user-plus me-2"></i>เพิ่มบุคลากรใหม่
            </button>
        </div>

        <!-- Filter & Stats -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-6">
            <div class="lg:col-span-3 bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex gap-4">
                <div class="flex-1">
                    <input type="text" id="searchEmp" oninput="filterEmp()" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="ค้นหาชื่อ หรือตำแหน่ง...">
                </div>
                <select id="filterDept" onchange="filterEmp()" class="bg-slate-50 border border-slate-200 rounded-lg text-sm px-3 py-2">
                    <option value="ALL">ทุกกองงาน</option>
                    <option value="สำนักปลัด">สำนักปลัด</option>
                    <option value="กองคลัง">กองคลัง</option>
                    <option value="กองช่าง">กองช่าง</option>
                    <option value="กองสาธารณสุขฯ">กองสาธารณสุขฯ</option>
                </select>
            </div>
            <div class="bg-emerald-600 p-4 rounded-xl shadow-lg text-white flex items-center justify-between">
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-80">บุคลากรทั้งหมด</p>
                    <h3 class="text-2xl font-bold" id="totalEmp">0</h3>
                </div>
                <i class="fa-solid fa-users text-3xl opacity-30"></i>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 text-slate-500 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 font-semibold uppercase tracking-wider">ชื่อ-นามสกุล</th>
                            <th class="px-6 py-4 font-semibold uppercase tracking-wider">ตำแหน่ง</th>
                            <th class="px-6 py-4 font-semibold uppercase tracking-wider">สังกัดกอง</th>
                            <th class="px-6 py-4 font-semibold uppercase tracking-wider">บทบาทระบบ</th>
                            <th class="px-6 py-4 font-semibold uppercase tracking-wider text-right">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="empTableBody" class="divide-y divide-slate-100">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Employee Modal (Reusing fields from Staff table) -->
<div class="modal fade" id="empModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-none rounded-2xl shadow-2xl">
            <div class="bg-emerald-600 text-white px-6 py-4 flex justify-between items-center">
                <h5 class="font-bold text-lg" id="empModalTitle">ข้อมูลบุคลากร</h5>
                <button type="button" class="text-emerald-200 hover:text-white" data-bs-dismiss="modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body p-6 bg-slate-50">
                <form id="empForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">ชื่อ</label>
                            <input type="text" id="empFirstName" required class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">นามสกุล</label>
                            <input type="text" id="empLastName" required class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">ตำแหน่ง</label>
                        <input type="text" id="empPosition" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">กอง/แผนก</label>
                        <select id="empDept" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm">
                            <option value="สำนักปลัด">สำนักปลัด</option>
                            <option value="กองคลัง">กองคลัง</option>
                            <option value="กองช่าง">กองช่าง</option>
                            <option value="กองสาธารณสุขฯ">กองสาธารณสุขฯ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">สิทธิ์การใช้งาน (Role)</label>
                        <select id="empRole" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm">
                            <option value="Staff">เจ้าหน้าที่ทั่วไป (Staff)</option>
                            <option value="Department Head">หัวหน้ากอง (Dept Head)</option>
                            <option value="Super Admin">ผู้ดูแลระบบ (Super Admin)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-slate-100 border-none px-6 py-4">
                <button type="button" class="px-4 py-2 text-slate-500 font-medium" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" onclick="saveEmp()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-emerald-700 shadow-md">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
<script>
    let allEmp = [];
    let currentEmpId = null;

    document.addEventListener('DOMContentLoaded', loadEmp);

    async function loadEmp() {
        try {
            const { data, error } = await supabaseClient.from('Staff').select('*').order('first_name');
            if (error) throw error;
            allEmp = data;
            document.getElementById('totalEmp').innerText = data.length;
            renderEmp(data);
        } catch (err) { alert(err.message); }
    }

    function renderEmp(data) {
        const tbody = document.getElementById('empTableBody');
        tbody.innerHTML = data.map(emp => `
            <tr class="hover:bg-slate-50">
                <td class="px-6 py-4 flex items-center gap-3">
                    <img src="${emp.avatar_url || 'https://ui-avatars.com/api/?name='+emp.first_name}" class="w-8 h-8 rounded-full border">
                    <span class="font-bold text-slate-800">${emp.first_name} ${emp.last_name}</span>
                </td>
                <td class="px-6 py-4 text-slate-600">${emp.position || '-'}</td>
                <td class="px-6 py-4 text-slate-500 font-medium">${emp.department}</td>
                <td class="px-6 py-4"><span class="px-2 py-1 rounded text-[10px] font-bold bg-slate-100 text-slate-600">${emp.role}</span></td>
                <td class="px-6 py-4 text-right">
                    <button onclick="editEmp('${emp.id}')" class="text-slate-400 hover:text-emerald-600"><i class="fa-solid fa-user-pen"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function filterEmp() {
        const search = document.getElementById('searchEmp').value.toLowerCase();
        const dept = document.getElementById('filterDept').value;
        const filtered = allEmp.filter(e => {
            const matchSearch = e.first_name.toLowerCase().includes(search) || e.last_name.toLowerCase().includes(search) || (e.position && e.position.toLowerCase().includes(search));
            const matchDept = dept === 'ALL' || e.department === dept;
            return matchSearch && matchDept;
        });
        renderEmp(filtered);
    }

    function openAddEmpModal() {
        currentEmpId = null;
        document.getElementById('empForm').reset();
        document.getElementById('empModalTitle').innerText = 'เพิ่มบุคลากรใหม่';
        new bootstrap.Modal(document.getElementById('empModal')).show();
    }

    async function saveEmp() {
        const first_name = document.getElementById('empFirstName').value;
        const last_name = document.getElementById('empLastName').value;
        const position = document.getElementById('empPosition').value;
        const department = document.getElementById('empDept').value;
        const role = document.getElementById('empRole').value;

        const empData = { first_name, last_name, position, department, role };

        try {
            if (currentEmpId) {
                await supabaseClient.from('Staff').update(empData).eq('id', currentEmpId);
            } else {
                await supabaseClient.from('Staff').insert([empData]);
            }
            bootstrap.Modal.getInstance(document.getElementById('empModal')).hide();
            loadEmp();
        } catch (err) { alert(err.message); }
    }
    
    async function editEmp(id) {
        currentEmpId = id;
        const emp = allEmp.find(e => e.id === id);
        document.getElementById('empFirstName').value = emp.first_name;
        document.getElementById('empLastName').value = emp.last_name;
        document.getElementById('empPosition').value = emp.position || '';
        document.getElementById('empDept').value = emp.department;
        document.getElementById('empRole').value = emp.role;
        new bootstrap.Modal(document.getElementById('empModal')).show();
    }
</script>
    <script src="assets/js/responsive.js"></script>
</body>
</html>
