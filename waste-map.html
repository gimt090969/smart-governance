<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนที่ลูกค้าขยะ - Smart Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>#wasteMap{height:calc(100vh - 220px);min-height:400px;border-radius:14px;z-index:1;}</style>
</head>
<body>
<nav id="sidebar"></nav>
<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="แผนที่ตำแหน่งบ้านลูกค้าขยะ"></div>
    <div class="page-content">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-map-location-dot text-info me-2"></i>แผนที่ลูกค้า</h4>
                <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                    <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none">แดชบอร์ด</a></li>
                    <li class="breadcrumb-item"><a href="finance.html" class="text-decoration-none">กองคลัง</a></li>
                    <li class="breadcrumb-item"><a href="waste-dashboard.html" class="text-decoration-none">ค่าธรรมเนียมขยะ</a></li>
                    <li class="breadcrumb-item active">แผนที่ลูกค้า</li>
                </ol></nav>
            </div>
        </div>

        <!-- Filters -->
        <div class="card mb-3">
            <div class="card-body py-3">
                <div class="row g-2 align-items-center">
                    <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="mapSearch" placeholder="ค้นหาชื่อ / บ้านเลขที่..." onkeyup="if(event.key==='Enter')searchWasteMap(this.value)"></div>
                    <div class="col-md-2"><select class="form-select form-select-sm" id="mapFilterMoo" onchange="applyMapFilter()"><option value="all">ทุกหมู่</option><option value="1">หมู่ 1</option><option value="2">หมู่ 2</option><option value="3">หมู่ 3</option></select></div>
                    <div class="col-md-2"><select class="form-select form-select-sm" id="mapFilterStatus" onchange="applyMapFilter()"><option value="all">ทุกสถานะ</option><option value="paid">ชำระแล้ว</option><option value="unpaid">ค้างชำระ</option><option value="pending">รออนุมัติ</option></select></div>
                    <div class="col-md-1"><button class="btn btn-sm btn-primary w-100" onclick="searchWasteMap(document.getElementById('mapSearch').value)"><i class="fa-solid fa-search"></i></button></div>
                    <div class="col-md-3 text-end">
                        <span class="badge me-1" style="background:#dcfce7;color:#166534;">● ชำระแล้ว</span>
                        <span class="badge me-1" style="background:#fef2f2;color:#991b1b;">● ค้างชำระ</span>
                        <span class="badge" style="background:#fef9c3;color:#854d0e;">● รออนุมัติ</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="wasteMap"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/waste.js"></script>
<script src="assets/js/waste-map.js"></script>
<script src="assets/js/responsive.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    initWasteData();
    initWasteMap('wasteMap');
    // Auto-focus if query param
    const params = new URLSearchParams(window.location.search);
    if (params.get('id')) {
        const c = getWasteCustomers().find(x => x.id === params.get('id'));
        if (c) setTimeout(() => searchWasteMap(c.name), 500);
    }
});
function applyMapFilter() {
    const moo = document.getElementById('mapFilterMoo').value;
    const status = document.getElementById('mapFilterStatus').value;
    loadWasteMarkers(moo, status);
}
</script>
</body>
</html>
