                </a>

                            <label class="form-label fw-semibold text-sm">หมู่ที่</label>

                        </div>

                            <label class="form-label fw-semibold text-sm">สถานะ</label>
                            <select class="form-select" id="pfStatus"><option value="normal">ปกติ</option><option value="broken">ชำรุด</option></select>

            <div class="modal-header border-0"><h6 class="modal-title fw-bold" id="viewImgTitle">รูปเสาไฟ</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body text-center p-3"><img id="viewImgSrc" style="max-width:100%;border-radius:12px;" alt="pole"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
<script>
const API='http://localhost:3000/api/electric';
// URL จาก Google Apps Script (Web App)
const GOOGLE_APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKIXR_S19sycQA1pDX0BKmPFgUzPT_U41DFOyrK9MRiLSm40qaMBzgF7G8VPIG-vq8/exec';

let allPoles=[],map=null,marker=null;
const DLAT=13.7563,DLNG=100.5018;

document.addEventListener('DOMContentLoaded',()=>{loadPoles()});

async function loadPoles(){
    if (supabaseClient) {
        const { data, error } = await supabaseClient.from('electric_poles').select('*');
        if (!error && data) {
            allPoles = data;
        } else {
            console.warn('Supabase fetch failed, falling back to local API', error);
            try{allPoles=await fetch(API+'/poles').then(r=>r.json())}catch(e){allPoles=[]}
        }
    } else {
        try{allPoles=await fetch(API+'/poles').then(r=>r.json())}catch(e){allPoles=[]}
    }
    document.getElementById('kTotal').textContent=allPoles.length;
    document.getElementById('kNormal').textContent=allPoles.filter(p=>p.status==='normal').length;
    document.getElementById('kBroken').textContent=allPoles.filter(p=>p.status==='broken').length;
    document.getElementById('kPhoto').textContent=allPoles.filter(p=>p.image_url).length;
    renderTable();
}

function getDriveImgUrl(url) {
    if (!url) return null;
    if (url.includes('drive.google.com/uc?')) {
        const idMatch = url.match(/id=([^&]+)/);
        if (idMatch && idMatch[1]) {
            return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w1000`;
        }
    }
    return url;
}

function renderTable(){
    let data=[...allPoles];
    const q=(document.getElementById('fSearch').value||'').toLowerCase();
    const v=document.getElementById('fVillage').value;
    const t=document.getElementById('fType').value;
    const s=document.getElementById('fStatus').value;
    if(q) data=data.filter(p=>(p.pole_code+'|'+p.location_detail).toLowerCase().includes(q));
    if(v) data=data.filter(p=>p.village_no===v);
    if(t) data=data.filter(p=>p.pole_type===t);
    if(s) data=data.filter(p=>p.status===s);
    document.getElementById('countLabel').textContent=`แสดง ${data.length} / ${allPoles.length} รายการ`;
    const tb=document.getElementById('tBody');
    if(!data.length){tb.innerHTML='<tr><td colspan="9" class="text-center py-4 text-muted">ไม่พบข้อมูล</td></tr>';return}
    tb.innerHTML=data.map(p=>{
        const safeUrl = getDriveImgUrl(p.image_url);
        const img=safeUrl?`<img src="${safeUrl}" class="pole-img" onclick="viewImage('${p.pole_code}','${safeUrl}')">`
            :'<div class="pole-img-placeholder"><i class="fa-solid fa-image"></i></div>';
        return `<tr>
            <td class="ps-4">${img}</td>
            <td class="fw-bold text-primary">${p.pole_code}</td>
            <td>${p.pole_type}</td><td>${p.light_type}</td>
            <td>หมู่ ${p.village_no||'-'}</td>
            <td class="text-sm">${p.location_detail||'-'}</td>
            <td class="text-xs text-muted">${p.lat?p.lat.toFixed(5)+', '+p.lng.toFixed(5):'-'}</td>
            <td><span class="badge status-${p.status}">${p.status==='broken'?'ชำรุด':'ปกติ'}</span></td>
            <td class="pe-4 text-center">
                <button class="btn btn-xs btn-primary me-1" onclick="editPole('${p.id}')"><i class="fa-solid fa-pen"></i></button>
                <button class="btn btn-xs btn-outline-danger" onclick="delPole('${p.id}')"><i class="fa-solid fa-trash"></i></button>
            </td></tr>`;
    }).join('');
}

function openAddPole(){
    document.getElementById('pfId').value='';
    document.getElementById('poleForm').reset();
    document.getElementById('imgPreviewBox').style.display='none';
    document.getElementById('modalTitle').innerHTML='<i class="fa-solid fa-plus text-primary me-2"></i>ลงทะเบียนเสาไฟใหม่';
    document.getElementById('gpsStatus').textContent='รอพิกัด';
    document.getElementById('gpsStatus').className='badge bg-secondary d-flex align-items-center justify-content-center h-100 w-100';
    const m=new bootstrap.Modal(document.getElementById('poleModal'));
    m.show();
    document.getElementById('poleModal').addEventListener('shown.bs.modal',function(){initMap();getGPS()},{once:true});
}

function initMap(){
    if(map){map.invalidateSize();return}
    map=L.map('regMap').setView([DLAT,DLNG],16);
    L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{maxZoom:20,attribution:'&copy; Google'}).addTo(map);
    marker=L.marker([DLAT,DLNG],{draggable:true}).addTo(map);
    marker.on('dragend',function(){
        const p=marker.getLatLng();
        setCoords(p.lat,p.lng);
    });
    map.on('click',function(e){
        marker.setLatLng(e.latlng);
        setCoords(e.latlng.lat,e.latlng.lng);
    });
}

function getGPS(){
    const st=document.getElementById('gpsStatus');
    st.textContent='กำลังค้นหา...';st.className='badge bg-warning text-dark d-flex align-items-center justify-content-center h-100 w-100';
    if(!navigator.geolocation){st.textContent='ไม่รองรับ GPS';st.className='badge bg-danger d-flex align-items-center justify-content-center h-100 w-100';return}
    navigator.geolocation.getCurrentPosition(pos=>{
        setCoords(pos.coords.latitude,pos.coords.longitude);
        if(map&&marker){map.setView([pos.coords.latitude,pos.coords.longitude],17);marker.setLatLng([pos.coords.latitude,pos.coords.longitude])}
        st.textContent='ได้พิกัดแล้ว';st.className='badge bg-success d-flex align-items-center justify-content-center h-100 w-100';
    },err=>{
        st.textContent='ดึงไม่ได้';st.className='badge bg-danger d-flex align-items-center justify-content-center h-100 w-100';
        if(map)map.invalidateSize();
    },{enableHighAccuracy:true,timeout:8000,maximumAge:0});
}

function setCoords(lat,lng){
    document.getElementById('pfLat').value=lat.toFixed(8);
    document.getElementById('pfLng').value=lng.toFixed(8);
}

function previewImage(input){
    const box=document.getElementById('imgPreviewBox');
    const img=document.getElementById('imgPreview');
    if(input.files&&input.files[0]){
        const reader=new FileReader();
        reader.onload=e=>{img.src=e.target.result;box.style.display='block'};
        reader.readAsDataURL(input.files[0]);
    }else{box.style.display='none'}
}

async function submitPole(e){
    e.preventDefault();
    const id=document.getElementById('pfId').value;
    let imageUrl=null;
    
    // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const originalBtnHtml = submitBtn.innerHTML;
    submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i>กำลังบันทึก...';
    submitBtn.disabled = true;

    try{
        const fileInput=document.getElementById('pfImage');
        // ตรวจสอบว่ามีการเลือกรูปใหม่หรือไม่
        if(fileInput.files&&fileInput.files[0]){
            // อ่านไฟล์เป็น Base64
            const reader=new FileReader();
            const base64String = await new Promise(res=>{
                reader.onload=ev=>res(ev.target.result);
                reader.readAsDataURL(fileInput.files[0])
            });

            // อัปโหลดรูปไป Google Drive ผ่าน Google Apps Script
            if (!GOOGLE_APP_SCRIPT_URL) {
                alert('กรุณาตั้งค่า GOOGLE_APP_SCRIPT_URL ในไฟล์โค้ด (publicworks-electric-registry.html) ก่อนเพื่อเปิดใช้งานการอัปโหลดรูป');
                throw new Error("Missing GAS URL");
            }

            submitBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up fa-bounce me-1"></i>อัปโหลดรูปลง Drive...';
            
            const response = await fetch(GOOGLE_APP_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    base64: base64String,
                    filename: `pole_${document.getElementById('pfCode').value}_${Date.now()}.jpg`
                })
            });
            const result = await response.json();
            
            if (result.error) throw new Error(result.error);
            imageUrl = result.imageUrl; // ได้ Direct Link รูปภาพกลับมา
        }
        
        // เตรียมข้อมูลบันทึกลง Supabase
        const payload={
            pole_code:document.getElementById('pfCode').value,
            pole_type:document.getElementById('pfType').value,
            light_type:document.getElementById('pfLight').value,
            lat:parseFloat(document.getElementById('pfLat').value),
            lng:parseFloat(document.getElementById('pfLng').value),
            location_detail:document.getElementById('pfLocation').value,
            village_no:document.getElementById('pfVillage').value,
            status:document.getElementById('pfStatus').value,
        };
        // ถ้ามีการอัปโหลดรูปใหม่ ให้แนบลิงก์ไปด้วย
        if(imageUrl) payload.image_url=imageUrl;

        submitBtn.innerHTML = '<i class="fa-solid fa-database fa-fade me-1"></i>บันทึกข้อมูล...';

        if (supabaseClient) {
            if(id){
                const { error } = await supabaseClient.from('electric_poles').update(payload).eq('id', id);
                if (error) throw error;
            } else {
                const { error } = await supabaseClient.from('electric_poles').insert([payload]);
                if (error) throw error;
            }
        } else {
            // Fallback
            if(id){await fetch(API+'/poles/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})}
            else{await fetch(API+'/poles',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})}
        }
        bootstrap.Modal.getInstance(document.getElementById('poleModal')).hide();
        showToast(id?'แก้ไขทะเบียนสำเร็จ':'ลงทะเบียนเสาไฟสำเร็จ','success');
        loadPoles();
    }catch(er){
        console.error(er);
        if (er.message !== "Missing GAS URL") {
            showToast('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + er.message, 'danger');
        }
    }finally{
        submitBtn.innerHTML = originalBtnHtml;
        submitBtn.disabled = false;
    }
}

function editPole(id){
    const p=allPoles.find(x=>x.id===id);if(!p)return;
    document.getElementById('pfId').value=p.id;
    document.getElementById('pfCode').value=p.pole_code;
    document.getElementById('pfType').value=p.pole_type;
    document.getElementById('pfLight').value=p.light_type;
    document.getElementById('pfVillage').value=p.village_no||'1';
    document.getElementById('pfStatus').value=p.status;
    document.getElementById('pfLocation').value=p.location_detail||'';
    document.getElementById('pfLat').value=p.lat;
    document.getElementById('pfLng').value=p.lng;
    document.getElementById('gpsStatus').textContent='ได้พิกัดแล้ว';
    document.getElementById('gpsStatus').className='badge bg-success d-flex align-items-center justify-content-center h-100 w-100';
    if(p.image_url){
        document.getElementById('imgPreview').src=getDriveImgUrl(p.image_url);
        document.getElementById('imgPreviewBox').style.display='block';
    }
    else{document.getElementById('imgPreviewBox').style.display='none'}
    document.getElementById('modalTitle').innerHTML='<i class="fa-solid fa-pen text-warning me-2"></i>แก้ไขทะเบียน '+p.pole_code;
    const m=new bootstrap.Modal(document.getElementById('poleModal'));m.show();
    document.getElementById('poleModal').addEventListener('shown.bs.modal',function(){
        initMap();
        if(p.lat&&p.lng){map.setView([p.lat,p.lng],17);marker.setLatLng([p.lat,p.lng])}
    },{once:true});
}

async function delPole(id){
    if(!confirm('ยืนยันการลบเสาไฟนี้ออกจากทะเบียน?'))return;
    try{
        if (supabaseClient) {
            const { error } = await supabaseClient.from('electric_poles').delete().eq('id', id);
            if (error) throw error;
        } else {
            await fetch(API+'/poles/'+id,{method:'DELETE'});
        }
        showToast('ลบสำเร็จ','success');
        loadPoles();
    }catch(e){
        console.error(e);
        showToast('ผิดพลาดในการลบข้อมูล','danger');
    }
}

function viewImage(code,url){
    document.getElementById('viewImgTitle').textContent='รูปเสาไฟ '+code;
    document.getElementById('viewImgSrc').src=url;
    new bootstrap.Modal(document.getElementById('viewImgModal')).show();
}

function exportRegistry(){
    let csv='รหัสเสา,ประเภทเสา,หลอดไฟ,หมู่ที่,สถานที่,Lat,Lng,สถานะ\n';
    allPoles.forEach(p=>{csv+=`${p.pole_code},${p.pole_type},${p.light_type},${p.village_no},${(p.location_detail||'').replace(/,/g,' ')},${p.lat},${p.lng},${p.status}\n`});
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='electric_poles_registry.csv';a.click();
    showToast('Export CSV สำเร็จ','success');
}

document.getElementById('poleModal').addEventListener('hidden.bs.modal',()=>{
    document.getElementById('pfId').value='';document.getElementById('poleForm').reset();
    document.getElementById('imgPreviewBox').style.display='none';
});
</script>
