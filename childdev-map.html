<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนที่บ้านเด็ก - ศูนย์พัฒนาเด็กเล็ก</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>#childMap{height:600px;border-radius:14px;z-index:1;}@media(max-width:767px){#childMap{height:400px;}}</style>
</head>
<body>
<nav id="sidebar"></nav>
<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="แผนที่บ้านเด็ก"></div>
    <div class="page-content">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-map-pin text-danger me-2"></i>แผนที่บ้านนักเรียน</h4>
                <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                    <li class="breadcrumb-item"><a href="childdev-dashboard.html" class="text-decoration-none">ศูนย์พัฒนาเด็กเล็ก</a></li>
                    <li class="breadcrumb-item active">แผนที่บ้านเด็ก</li>
                </ol></nav>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <div class="input-group input-group-sm" style="width:220px;">
                    <input type="text" class="form-control" id="searchInput" placeholder="ค้นหาชื่อเด็ก..." onkeyup="searchMap()">
                    <button class="btn btn-outline-primary" onclick="searchMap()"><i class="fa-solid fa-search"></i></button>
                </div>
                <select class="form-select form-select-sm" id="filterRoom" style="width:auto;" onchange="filterMap()">
                    <option value="">ทุกห้อง</option>
                </select>
            </div>
        </div>

        <!-- Legend -->
        <div class="d-flex gap-3 mb-3 flex-wrap" id="legend"></div>

        <!-- Map -->
        <div class="card fade-in-up">
            <div class="card-body p-2">
                <div id="childMap"></div>
            </div>
        </div>

        <!-- Summary -->
        <div class="row g-3 mt-3">
            <div class="col-md-6"><div class="card"><div class="card-body">
                <h6 class="fw-bold mb-3"><i class="fa-solid fa-chart-pie text-primary me-2"></i>จำนวนนักเรียนต่อห้อง</h6>
                <div id="roomStats"></div>
            </div></div></div>
            <div class="col-md-6"><div class="card"><div class="card-body">
                <h6 class="fw-bold mb-3"><i class="fa-solid fa-info-circle text-info me-2"></i>คำอธิบาย</h6>
                <p class="text-sm text-muted mb-2">แผนที่แสดงตำแหน่งบ้านนักเรียนทั้งหมดในศูนย์พัฒนาเด็กเล็ก โดยแยกสีตามห้องเรียน</p>
                <p class="text-sm text-muted mb-1"><i class="fa-solid fa-hand-pointer me-1"></i>คลิกที่ marker เพื่อดูข้อมูลนักเรียนและผู้ปกครอง</p>
                <p class="text-sm text-muted mb-0"><i class="fa-solid fa-route me-1"></i>สามารถเปิด Google Maps เพื่อนำทางได้</p>
            </div></div></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/childdev.js"></script>
<script src="assets/js/childdev-map.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const students = ChilddevDB.getAll('students');
    const classrooms = ChilddevDB.getAll('classrooms');

    // Populate filter
    const sel = document.getElementById('filterRoom');
    classrooms.forEach(r => { sel.innerHTML += `<option value="${r.id}">${r.name}</option>`; });

    // Legend
    document.getElementById('legend').innerHTML = classrooms.map(r => {
        const count = students.filter(s => s.classroomId === r.id).length;
        return `<div class="d-flex align-items-center gap-1"><span class="childdev-class-dot" style="background:${r.color};"></span><span class="text-xs">${r.name} (${count})</span></div>`;
    }).join('');

    // Room stats
    document.getElementById('roomStats').innerHTML = classrooms.map(r => {
        const count = students.filter(s => s.classroomId === r.id).length;
        const pct = students.length ? (count / students.length * 100).toFixed(0) : 0;
        return `<div class="d-flex align-items-center gap-2 mb-2">
            <span class="childdev-class-dot" style="background:${r.color};"></span>
            <span class="text-sm flex-grow-1">${r.name}</span>
            <span class="fw-bold text-sm">${count} คน</span>
            <div class="progress flex-grow-1" style="height:6px;max-width:100px;"><div class="progress-bar" style="width:${pct}%;background:${r.color};"></div></div>
        </div>`;
    }).join('');

    // Find center from student data
    const lats = students.filter(s => s.address?.lat).map(s => s.address.lat);
    const lngs = students.filter(s => s.address?.lng).map(s => s.address.lng);
    const centerLat = lats.length ? lats.reduce((a,b) => a+b) / lats.length : 15.0;
    const centerLng = lngs.length ? lngs.reduce((a,b) => a+b) / lngs.length : 103.0;

    ChilddevMap.init('childMap', [centerLat, centerLng], 14);
    ChilddevMap.loadStudentMarkers(students, classrooms);
});

function filterMap() {
    const room = document.getElementById('filterRoom').value;
    const students = ChilddevDB.getAll('students');
    const classrooms = ChilddevDB.getAll('classrooms');
    ChilddevMap.loadStudentMarkers(students, classrooms, room);
}

function searchMap() {
    const q = document.getElementById('searchInput').value;
    const students = ChilddevDB.getAll('students');
    const classrooms = ChilddevDB.getAll('classrooms');
    if (!q) { ChilddevMap.loadStudentMarkers(students, classrooms); return; }
    ChilddevMap.search(q, students, classrooms);
}
</script>
<script src="assets/js/responsive.js"></script>
</body>
</html>
