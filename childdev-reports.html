<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงาน - ศูนย์พัฒนาเด็กเล็ก</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<nav id="sidebar"></nav>
<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="รายงาน"></div>
    <div class="page-content">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-chart-column text-primary me-2"></i>รายงานศูนย์พัฒนาเด็กเล็ก</h4>
                <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                    <li class="breadcrumb-item"><a href="childdev-dashboard.html" class="text-decoration-none">ศูนย์พัฒนาเด็กเล็ก</a></li>
                    <li class="breadcrumb-item active">รายงาน</li>
                </ol></nav>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <select class="form-select form-select-sm" id="filterPeriod" style="width:auto;" onchange="loadReport()">
                    <option value="today">วันนี้</option>
                    <option value="week">สัปดาห์นี้</option>
                    <option value="month" selected>เดือนนี้</option>
                    <option value="year">ปีนี้</option>
                </select>
                <select class="form-select form-select-sm" id="filterRoom" style="width:auto;" onchange="loadReport()">
                    <option value="">ทุกห้อง</option>
                </select>
                <button class="btn btn-sm btn-outline-primary" onclick="printCurrentReport()"><i class="fa-solid fa-print me-1"></i>Print</button>
                <button class="btn btn-sm btn-outline-success" onclick="exportReport()"><i class="fa-solid fa-file-excel me-1"></i>Excel</button>
            </div>
        </div>

        <!-- Report Tabs -->
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabAttendance" onclick="loadReport()">📋 การมาเรียน</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabHealth" onclick="loadReport()">❤️ สุขภาพ</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabBMI" onclick="loadReport()">⚖️ BMI</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabLunch" onclick="loadReport()">🍽️ อาหาร</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabActivity" onclick="loadReport()">🎨 กิจกรรม</button></li>
        </ul>

        <div class="tab-content">
            <!-- Attendance Tab -->
            <div class="tab-pane fade show active" id="tabAttendance">
                <div class="row g-3 mb-4">
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">มาเรียน</div><div class="kpi-value text-success" id="rptPresent">-</div></div><div class="kpi-icon bg-success bg-opacity-10 text-success"><i class="fa-solid fa-circle-check"></i></div></div></div></div>
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">มาสาย</div><div class="kpi-value text-warning" id="rptLate">-</div></div><div class="kpi-icon bg-warning bg-opacity-10 text-warning"><i class="fa-solid fa-clock"></i></div></div></div></div>
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">ขาดเรียน</div><div class="kpi-value text-danger" id="rptAbsent">-</div></div><div class="kpi-icon bg-danger bg-opacity-10 text-danger"><i class="fa-solid fa-user-xmark"></i></div></div></div></div>
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">ลาป่วย</div><div class="kpi-value text-secondary" id="rptSick">-</div></div><div class="kpi-icon bg-secondary bg-opacity-10 text-secondary"><i class="fa-solid fa-bed"></i></div></div></div></div>
                </div>
                <div class="card"><div class="card-body"><canvas id="attChart" height="250"></canvas></div></div>
            </div>

            <!-- Health Tab -->
            <div class="tab-pane fade" id="tabHealth">
                <div class="row g-3 mb-4">
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">ดื่มนม</div><div class="kpi-value text-info" id="rptMilk">-</div></div><div class="kpi-icon bg-info bg-opacity-10 text-info"><i class="fa-solid fa-glass-water"></i></div></div></div></div>
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">แปรงฟัน</div><div class="kpi-value" id="rptBrush" style="color:#ec4899;">-</div></div><div class="kpi-icon" style="background:rgba(236,72,153,0.1);color:#ec4899;"><i class="fa-solid fa-tooth"></i></div></div></div></div>
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">มีไข้</div><div class="kpi-value text-danger" id="rptFever">-</div></div><div class="kpi-icon bg-danger bg-opacity-10 text-danger"><i class="fa-solid fa-thermometer-half"></i></div></div></div></div>
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">ป่วย</div><div class="kpi-value text-warning" id="rptSickH">-</div></div><div class="kpi-icon bg-warning bg-opacity-10 text-warning"><i class="fa-solid fa-face-frown"></i></div></div></div></div>
                </div>
                <div class="card"><div class="card-body"><canvas id="healthChart" height="250"></canvas></div></div>
            </div>

            <!-- BMI Tab -->
            <div class="tab-pane fade" id="tabBMI">
                <div class="row g-3 mb-4">
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">ผอม</div><div class="kpi-value text-warning" id="rptThin">-</div></div><div class="kpi-icon bg-warning bg-opacity-10 text-warning"><i class="fa-solid fa-arrow-down"></i></div></div></div></div>
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">ปกติ</div><div class="kpi-value text-success" id="rptNormal">-</div></div><div class="kpi-icon bg-success bg-opacity-10 text-success"><i class="fa-solid fa-check"></i></div></div></div></div>
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">ท้วม</div><div class="kpi-value" id="rptChubby" style="color:#f97316;">-</div></div><div class="kpi-icon" style="background:rgba(249,115,22,0.1);color:#f97316;"><i class="fa-solid fa-arrow-up"></i></div></div></div></div>
                    <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">อ้วน</div><div class="kpi-value text-danger" id="rptObese">-</div></div><div class="kpi-icon bg-danger bg-opacity-10 text-danger"><i class="fa-solid fa-triangle-exclamation"></i></div></div></div></div>
                </div>
                <div class="card"><div class="card-body"><canvas id="bmiChart" height="250"></canvas></div></div>
            </div>

            <!-- Lunch Tab -->
            <div class="tab-pane fade" id="tabLunch">
                <div class="card"><div class="card-header border-0"><h6 class="fw-bold mb-0">สรุปเมนูอาหาร</h6></div>
                    <div class="card-body p-0"><div class="table-container">
                        <table class="table table-hover mb-0">
                            <thead><tr><th class="ps-4">วันที่</th><th>เมนู</th><th>โภชนาการ</th><th>ค่าใช้จ่าย</th></tr></thead>
                            <tbody id="lunchBody"></tbody>
                        </table>
                    </div></div>
                </div>
            </div>

            <!-- Activity Tab -->
            <div class="tab-pane fade" id="tabActivity">
                <div class="card"><div class="card-header border-0"><h6 class="fw-bold mb-0">สรุปกิจกรรม</h6></div>
                    <div class="card-body p-0"><div class="table-container">
                        <table class="table table-hover mb-0">
                            <thead><tr><th class="ps-4">วันที่</th><th>ชื่อกิจกรรม</th><th>ห้อง</th><th>ครูผู้สอน</th></tr></thead>
                            <tbody id="actBody"></tbody>
                        </table>
                    </div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/childdev.js"></script>
<script src="assets/js/childdev-report.js"></script>
<script>
let attChartInst, healthChartInst, bmiChartInst;

document.addEventListener('DOMContentLoaded', function() {
    const rooms = ChilddevDB.getAll('classrooms');
    const sel = document.getElementById('filterRoom');
    rooms.forEach(r => { sel.innerHTML += `<option value="${r.id}">${r.name}</option>`; });
    loadReport();
});

function loadReport() {
    const period = document.getElementById('filterPeriod').value;
    const room = document.getElementById('filterRoom').value;
    const { from, to } = ReportModule.getDateRange(period);
    const students = ChilddevDB.getAll('students');
    const attendance = ChilddevDB.getAll('attendance');
    const health = ChilddevDB.getAll('health');
    const classrooms = ChilddevDB.getAll('classrooms');

    // Attendance
    const attRpt = ReportModule.generateAttendanceReport(students, attendance, from, to, room);
    document.getElementById('rptPresent').textContent = attRpt.present;
    document.getElementById('rptLate').textContent = attRpt.late;
    document.getElementById('rptAbsent').textContent = attRpt.absent;
    document.getElementById('rptSick').textContent = attRpt.sick;

    if (attChartInst) attChartInst.destroy();
    attChartInst = new Chart(document.getElementById('attChart'), {
        type: 'doughnut',
        data: {
            labels: ['มาเรียน','มาสาย','ขาดเรียน','ลาป่วย'],
            datasets: [{ data: [attRpt.present, attRpt.late, attRpt.absent, attRpt.sick], backgroundColor: ['#10b981','#f59e0b','#ef4444','#6b7280'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Prompt', size: 12 } } } } }
    });

    // Health
    const hRpt = ReportModule.generateHealthReport(students, health, from, to, room);
    document.getElementById('rptMilk').textContent = hRpt.milk;
    document.getElementById('rptBrush').textContent = hRpt.brush;
    document.getElementById('rptFever').textContent = hRpt.fever;
    document.getElementById('rptSickH').textContent = hRpt.sick;

    if (healthChartInst) healthChartInst.destroy();
    healthChartInst = new Chart(document.getElementById('healthChart'), {
        type: 'bar',
        data: {
            labels: ['ดื่มนม','แปรงฟัน','มีไข้','ป่วย'],
            datasets: [{ label: 'จำนวน', data: [hRpt.milk, hRpt.brush, hRpt.fever, hRpt.sick], backgroundColor: ['#0694a2','#ec4899','#ef4444','#f59e0b'], borderRadius: 6 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f3f4f6' } }, x: { grid: { display: false } } } }
    });

    // BMI
    const bmiRpt = ReportModule.generateBMIReport(students, room);
    document.getElementById('rptThin').textContent = bmiRpt.thin;
    document.getElementById('rptNormal').textContent = bmiRpt.normal;
    document.getElementById('rptChubby').textContent = bmiRpt.chubby;
    document.getElementById('rptObese').textContent = bmiRpt.obese;

    if (bmiChartInst) bmiChartInst.destroy();
    bmiChartInst = new Chart(document.getElementById('bmiChart'), {
        type: 'pie',
        data: {
            labels: ['ผอม','ปกติ','ท้วม','อ้วน'],
            datasets: [{ data: [bmiRpt.thin, bmiRpt.normal, bmiRpt.chubby, bmiRpt.obese], backgroundColor: ['#f59e0b','#10b981','#f97316','#ef4444'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Prompt', size: 12 } } } } }
    });

    // Lunch
    const menus = ChilddevDB.getAll('lunch').filter(m => m.date >= from && m.date <= to).sort((a,b) => b.date.localeCompare(a.date));
    document.getElementById('lunchBody').innerHTML = menus.length === 0
        ? '<tr><td colspan="4" class="text-center py-3 text-muted">ไม่มีข้อมูล</td></tr>'
        : menus.map(m => `<tr><td class="ps-4">${childdevFormatDate(m.date)}</td><td class="fw-semibold">${m.menu}</td><td class="text-sm text-muted">${m.nutrition}</td><td>${m.cost} บาท</td></tr>`).join('');

    // Activities
    const acts = ChilddevDB.getAll('activities').filter(a => a.date >= from && a.date <= to).sort((a,b) => b.date.localeCompare(a.date));
    document.getElementById('actBody').innerHTML = acts.length === 0
        ? '<tr><td colspan="4" class="text-center py-3 text-muted">ไม่มีข้อมูล</td></tr>'
        : acts.map(a => {
            const rm = a.classroomId === 'ALL' ? 'ทุกห้อง' : classrooms.find(c => c.id === a.classroomId)?.name || '-';
            return `<tr><td class="ps-4">${a.date}</td><td class="fw-semibold">${a.name}</td><td>${rm}</td><td>${a.teacher}</td></tr>`;
        }).join('');
}

function printCurrentReport() {
    const activeTab = document.querySelector('.nav-tabs .nav-link.active')?.textContent?.trim() || 'รายงาน';
    ReportModule.printReport(`รายงาน${activeTab} - ศูนย์พัฒนาเด็กเล็ก`, document.querySelector('.tab-pane.show.active').innerHTML);
}

function exportReport() { if(typeof showToast==='function') showToast('เตรียม Export Excel...','info'); }
</script>
<script src="assets/js/responsive.js"></script>
</body>
</html>
