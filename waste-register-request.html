<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำขอขึ้นทะเบียนใหม่ - Smart Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<nav id="sidebar"></nav>
<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="คำขอขึ้นทะเบียนลูกค้าใหม่"></div>
    <div class="page-content">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-user-plus text-success me-2"></i>คำขอขึ้นทะเบียนใหม่</h4>
                <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                    <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none">แดชบอร์ด</a></li>
                    <li class="breadcrumb-item"><a href="finance.html" class="text-decoration-none">กองคลัง</a></li>
                    <li class="breadcrumb-item"><a href="waste-dashboard.html" class="text-decoration-none">ค่าธรรมเนียมขยะ</a></li>
                    <li class="breadcrumb-item active">คำขอขึ้นทะเบียน</li>
                </ol></nav>
            </div>
        </div>

        <!-- Summary -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-4"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">รอตรวจสอบ</div><div class="kpi-value text-warning" id="regPending">-</div></div><div class="kpi-icon bg-warning bg-opacity-10 text-warning"><i class="fa-solid fa-clock"></i></div></div></div></div>
            <div class="col-6 col-lg-4"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">อนุมัติแล้ว</div><div class="kpi-value text-success" id="regApproved">-</div></div><div class="kpi-icon bg-success bg-opacity-10 text-success"><i class="fa-solid fa-check"></i></div></div></div></div>
            <div class="col-6 col-lg-4"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">ปฏิเสธ</div><div class="kpi-value text-danger" id="regRejected">-</div></div><div class="kpi-icon bg-danger bg-opacity-10 text-danger"><i class="fa-solid fa-xmark"></i></div></div></div></div>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="card-header border-0"><h6 class="fw-bold mb-0"><i class="fa-solid fa-list text-primary me-2"></i>รายการคำขอขึ้นทะเบียน</h6></div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr>
                            <th class="ps-4">เลขคำขอ</th><th>ชื่อ</th><th>บ้านเลขที่</th><th>ประเภท</th>
                            <th>เบอร์โทร</th><th>วันที่ยื่น</th><th>สถานะ</th><th class="pe-4 text-center">จัดการ</th>
                        </tr></thead>
                        <tbody id="regTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/waste.js"></script>
<script src="assets/js/responsive.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() { initWasteData(); renderRegRequests(); });

function renderRegRequests() {
    const reqs = getRegisterRequests();
    document.getElementById('regPending').textContent = reqs.filter(r=>r.status==='pending').length;
    document.getElementById('regApproved').textContent = reqs.filter(r=>r.status==='approved').length;
    document.getElementById('regRejected').textContent = reqs.filter(r=>r.status==='rejected').length;

    const tbody = document.getElementById('regTableBody');
    tbody.innerHTML = reqs.map(r => `<tr>
        <td class="ps-4 fw-semibold text-xs">${r.id}</td>
        <td>${r.name}</td><td>${r.house_no} ม.${r.moo}</td>
        <td><span class="badge bg-light text-dark">${r.type}</span></td>
        <td class="text-xs">${r.phone||'-'}</td>
        <td class="text-xs text-muted">${r.date}</td>
        <td><span class="badge ${r.status==='pending'?'bg-warning text-dark':r.status==='approved'?'bg-success':'bg-danger'}">${r.status==='pending'?'รอตรวจสอบ':r.status==='approved'?'อนุมัติแล้ว':'ปฏิเสธ'}</span></td>
        <td class="pe-4 text-center">${r.status==='pending'?`
            <button class="btn btn-xs btn-success me-1" onclick="approveReg('${r.id}')"><i class="fa-solid fa-check me-1"></i>อนุมัติ</button>
            <button class="btn btn-xs btn-outline-danger" onclick="rejectReg('${r.id}')"><i class="fa-solid fa-xmark"></i></button>
        `:'<span class="text-xs text-muted">ดำเนินการแล้ว</span>'}</td>
    </tr>`).join('');
}

function approveReg(id) {
    Swal.fire({title:'อนุมัติคำขอ?',text:'ระบบจะสร้างทะเบียนลูกค้าใหม่อัตโนมัติ',icon:'question',showCancelButton:true,confirmButtonText:'อนุมัติ',confirmButtonColor:'#057a55'}).then(result => {
        if (result.isConfirmed) {
            const reqs = getRegisterRequests();
            const r = reqs.find(x => x.id === id);
            if (!r) return;
            r.status = 'approved';
            saveRegisterRequests(reqs);
            // Create customer
            const customers = getWasteCustomers();
            const fees = {'บ้านพัก':40,'ร้านค้า':120,'อาคาร':300,'โรงงาน':2500};
            customers.push({
                id: generateCustomerId(), house_no: r.house_no, moo: r.moo, name: r.name,
                id_card:'', phone: r.phone, type: r.type, fee: fees[r.type]||40,
                start_date: new Date().toISOString().split('T')[0], status:'active',
                lat: 14.890 + Math.random()*0.01, lng: 102.020 + Math.random()*0.01, note:'สร้างจากคำขอ '+r.id
            });
            saveWasteCustomers(customers);
            showToast('อนุมัติสำเร็จ สร้างทะเบียนลูกค้าแล้ว','success');
            renderRegRequests();
        }
    });
}

function rejectReg(id) {
    Swal.fire({title:'ปฏิเสธคำขอ?',input:'text',inputPlaceholder:'เหตุผล...',showCancelButton:true,confirmButtonColor:'#c81e1e',confirmButtonText:'ปฏิเสธ'}).then(r => {
        if (r.isConfirmed) {
            const reqs = getRegisterRequests();
            const req = reqs.find(x => x.id === id);
            if (req) { req.status = 'rejected'; req.note = r.value || 'ปฏิเสธ'; saveRegisterRequests(reqs); }
            showToast('ปฏิเสธคำขอแล้ว','warning');
            renderRegRequests();
        }
    });
}
</script>
</body>
</html>
