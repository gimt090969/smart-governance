<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GIS Map - แผนที่ครัวเรือนและประชากร Digital Data Center">
    <title>GIS Map - Digital Data Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        #gisMap{height:calc(100vh - 180px);min-height:500px;border-radius:12px;z-index:1}
        .map-controls{position:absolute;top:12px;right:12px;z-index:500;display:flex;flex-direction:column;gap:8px}
        .map-panel{background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.12);padding:1rem;min-width:220px;max-height:60vh;overflow-y:auto}
        .layer-btn{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:0.78rem;transition:all .15s;width:100%}
        .layer-btn:hover{border-color:#3b82f6;background:#eff6ff}
        .layer-btn.active{background:#1a56db;color:#fff;border-color:#1a56db}
        .layer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .map-search{position:absolute;top:12px;left:60px;z-index:500;width:300px}
        .map-search input{border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);border:none;padding:10px 14px;font-size:0.85rem;width:100%}
        .radius-control{display:flex;align-items:center;gap:6px;font-size:0.78rem}
        .map-stats{position:absolute;bottom:12px;left:12px;z-index:500;background:rgba(255,255,255,0.95);border-radius:10px;padding:8px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.1);font-size:0.75rem;display:flex;gap:12px}
    </style>
</head>
<body>
<nav id="sidebar"></nav>
<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="GIS Map — แผนที่ครัวเรือน"></div>
    <div class="page-content">
        <div class="mb-3"><a href="digital-data-dashboard.html" class="btn btn-light shadow-sm border fw-bold" style="border-radius:10px;"><i class="fa-solid fa-arrow-left me-2"></i>ย้อนกลับ (Digital Data Center)</a></div>
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-map-location-dot text-primary me-2"></i>GIS Map — แผนที่ครัวเรือน</h4>
                <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                    <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none">แดชบอร์ด</a></li>
                    <li class="breadcrumb-item"><a href="digital-data-dashboard.html" class="text-decoration-none">Digital Data Center</a></li>
                    <li class="breadcrumb-item active">GIS Map</li>
                </ol></nav>
            </div>
            <div class="d-flex gap-2">
                <select class="form-select form-select-sm" id="villageFilter" style="width:180px" onchange="applyVillageFilter()">
                    <option value="">ทุกหมู่บ้าน</option>
                    <option value="1">หมู่ 1</option><option value="2">หมู่ 2</option><option value="3">หมู่ 3</option>
                    <option value="4">หมู่ 4</option><option value="5">หมู่ 5</option><option value="6">หมู่ 6</option>
                    <option value="7">หมู่ 7</option><option value="8">หมู่ 8</option><option value="9">หมู่ 9</option>
                    <option value="10">หมู่ 10</option><option value="11">หมู่ 11</option>
                </select>
                <button class="btn btn-sm btn-outline-primary" onclick="toggleHeatmap()"><i class="fa-solid fa-fire me-1"></i>Heatmap</button>
            </div>
        </div>

        <div style="position:relative;">
            <div id="gisMap"></div>

            <!-- Layer Controls -->
            <div class="map-controls">
                <div class="map-panel">
                    <div class="fw-bold mb-2" style="font-size:0.8rem;"><i class="fa-solid fa-layer-group me-1"></i>Layer Controls</div>
                    <div class="d-flex flex-column gap-1">
                        <button class="layer-btn active" data-layer="all" onclick="setLayer('all',this)"><div class="layer-dot" style="background:#3b82f6"></div>ครัวเรือนทั้งหมด</button>
                        <button class="layer-btn" data-layer="elderly" onclick="setLayer('elderly',this)"><div class="layer-dot" style="background:#f59e0b"></div>ผู้สูงอายุ</button>
                        <button class="layer-btn" data-layer="disabled" onclick="setLayer('disabled',this)"><div class="layer-dot" style="background:#8b5cf6"></div>ผู้พิการ</button>
                        <button class="layer-btn" data-layer="bedridden" onclick="setLayer('bedridden',this)"><div class="layer-dot" style="background:#ef4444"></div>ผู้ป่วยติดเตียง</button>
                        <button class="layer-btn" data-layer="newborn" onclick="setLayer('newborn',this)"><div class="layer-dot" style="background:#10b981"></div>เด็กแรกเกิด</button>
                        <button class="layer-btn" data-layer="poor" onclick="setLayer('poor',this)"><div class="layer-dot" style="background:#dc2626"></div>ครัวเรือนยากจน</button>
                    </div>
                    <hr class="my-2">
                    <div class="radius-control">
                        <i class="fa-solid fa-crosshairs text-muted"></i>
                        <input type="range" class="form-range" id="radiusSlider" min="0.5" max="5" step="0.5" value="2" style="width:100px" onchange="updateRadius()">
                        <span id="radiusLabel" class="text-muted">2 km</span>
                    </div>
                </div>
            </div>

            <!-- Map Stats Bar -->
            <div class="map-stats">
                <span><i class="fa-solid fa-map-pin text-primary me-1"></i>แสดง <b id="markerCount">0</b> จุด</span>
                <span><i class="fa-solid fa-house text-success me-1"></i><b id="householdCount">0</b> ครัวเรือน</span>
                <span><i class="fa-solid fa-users text-info me-1"></i><b id="popCount">0</b> คน</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js?v=2"></script>
<script src="assets/js/app.js?v=2"></script>
<script src="assets/js/digital-data-service.js?v=2"></script>
<script src="assets/js/gis-service.js?v=2"></script>
<script src="assets/js/responsive.js?v=2"></script>
<script>
let allMapData=[], heatOn=false, currentLayer='all';
document.addEventListener('DOMContentLoaded', async()=>{
    GISService.initMap('gisMap');
    allMapData = await DigitalDataService.getHouseholdMap();
    GISService.loadLayers(allMapData);
    updateStats(allMapData);
});
function setLayer(type, btn){
    document.querySelectorAll('.layer-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentLayer=type;
    const filtered = GISService.filterSpatialData(type, allMapData);
    updateStats(filtered);
}
function applyVillageFilter(){
    const v=document.getElementById('villageFilter').value;
    let data=allMapData;
    if(v) data=allMapData.filter(h=>String(h.village_no)===v);
    GISService.clearLayers();
    GISService.loadLayers(data);
    if(currentLayer!=='all') GISService.filterSpatialData(currentLayer,data);
    updateStats(data);
}
function toggleHeatmap(){
    heatOn=!heatOn;
    GISService.toggleHeatmap(allMapData,heatOn);
}
function updateRadius(){
    const v=document.getElementById('radiusSlider').value;
    document.getElementById('radiusLabel').textContent=v+' km';
}
function updateStats(data){
    document.getElementById('markerCount').textContent=data.filter(h=>h.latitude&&h.longitude).length;
    document.getElementById('householdCount').textContent=data.length;
    document.getElementById('popCount').textContent=data.reduce((s,h)=>s+(h.total_members||0),0);
}
</script>
</body>
</html>
