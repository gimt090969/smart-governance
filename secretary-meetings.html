<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>งานประชุม - ระบบบริหารจัดการเทศบาลอัจฉริยะ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
    </style>
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="bg-slate-50">

<nav id="sidebar"></nav>

<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="งานประชุม (Meeting Management)"></div>

    <div class="page-content p-4">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">งานประชุม</h1>
                <nav class="flex text-xs text-slate-500 mt-1">
                    <a href="secretary.html" class="hover:text-blue-600 transition">สำนักปลัด</a>
                    <span class="mx-2">/</span>
                    <span class="text-slate-800">งานประชุม</span>
                </nav>
            </div>
            <button onclick="openAddMeetingModal()" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-amber-700 transition shadow-md">
                <i class="fa-solid fa-plus me-2"></i>นัดหมายการประชุมใหม่
            </button>
        </div>

        <!-- Meetings Grid -->
        <div id="meetingsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loaded via JS -->
            <div class="col-span-full text-center py-20 text-slate-400">กำลังโหลดข้อมูลการประชุม...</div>
        </div>

    </div>
</div>

<!-- Meeting Modal -->
<div class="modal fade" id="meetingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-none rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-amber-600 text-white px-6 py-4 flex justify-between items-center">
                <h5 class="font-bold text-lg" id="meetingModalTitle">นัดหมายการประชุม</h5>
                <button type="button" class="text-amber-200 hover:text-white" data-bs-dismiss="modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body p-6 bg-slate-50">
                <form id="meetingForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">หัวข้อการประชุม</label>
                        <input type="text" id="meetingTitle" required class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 focus:outline-none" placeholder="ระบุหัวข้อวาระการประชุม">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">วันที่ประชุม</label>
                        <input type="date" id="meetingDate" required class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">รายละเอียด / วาระ</label>
                        <textarea id="meetingDetail" rows="4" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 focus:outline-none" placeholder="สรุปเนื้อหาหรือวาระการประชุม..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">แนบเอกสาร (Link)</label>
                        <input type="text" id="meetingFileUrl" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 focus:outline-none" placeholder="ระบุ URL เอกสารประกอบการประชุม">
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-slate-100 border-none px-6 py-4">
                <button type="button" class="px-4 py-2 text-slate-500 font-medium hover:text-slate-800 transition" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" onclick="saveMeeting()" class="bg-amber-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-amber-700 shadow-md transition">บันทึกนัดหมาย</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
<script>
    let currentMeetingId = null;

    document.addEventListener('DOMContentLoaded', loadMeetings);

    async function loadMeetings() {
        try {
            const { data, error } = await supabaseClient
                .from('meetings')
                .select('*')
                .order('meeting_date', { ascending: false });

            if (error) throw error;
            renderMeetings(data);
        } catch (err) {
            document.getElementById('meetingsGrid').innerHTML = `<div class="col-span-full text-center text-red-500">${err.message}</div>`;
        }
    }

    function renderMeetings(data) {
        const grid = document.getElementById('meetingsGrid');
        if (!data || data.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">ไม่พบรายการประชุม</div>';
            return;
        }

        grid.innerHTML = data.map(m => `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-amber-50 text-amber-600 p-3 rounded-xl font-bold flex flex-col items-center min-w-[60px]">
                            <span class="text-xs uppercase">${new Date(m.meeting_date).toLocaleString('th-TH', {month:'short'})}</span>
                            <span class="text-xl">${new Date(m.meeting_date).getDate()}</span>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="editMeeting('${m.id}')" class="text-slate-400 hover:text-amber-600 p-2"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteMeeting('${m.id}')" class="text-slate-400 hover:text-red-600 p-2"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-2 leading-tight">${m.title}</h3>
                    <p class="text-slate-500 text-xs mb-4 line-clamp-3">${m.detail || 'ไม่มีรายละเอียด'}</p>
                    ${m.file_url ? `
                        <a href="${m.file_url}" target="_blank" class="flex items-center gap-2 text-blue-600 text-xs font-bold bg-blue-50 px-3 py-2 rounded-lg hover:bg-blue-100 transition">
                            <i class="fa-solid fa-file-pdf"></i> เอกสารประกอบการประชุม
                        </a>
                    ` : '<span class="text-slate-300 text-[10px]">ไม่มีเอกสารแนบ</span>'}
                </div>
            </div>
        `).join('');
    }

    function openAddMeetingModal() {
        currentMeetingId = null;
        document.getElementById('meetingForm').reset();
        document.getElementById('meetingModalTitle').innerText = 'นัดหมายการประชุมใหม่';
        new bootstrap.Modal(document.getElementById('meetingModal')).show();
    }

    async function saveMeeting() {
        const title = document.getElementById('meetingTitle').value;
        const meeting_date = document.getElementById('meetingDate').value;
        const detail = document.getElementById('meetingDetail').value;
        const file_url = document.getElementById('meetingFileUrl').value;

        if (!title || !meeting_date) return alert('กรุณาระบุหัวข้อและวันที่');

        const meetingData = { title, meeting_date, detail, file_url };

        try {
            let error;
            if (currentMeetingId) {
                const { error: err } = await supabaseClient.from('meetings').update(meetingData).eq('id', currentMeetingId);
                error = err;
            } else {
                const { error: err } = await supabaseClient.from('meetings').insert([meetingData]);
                error = err;
            }

            if (error) throw error;
            bootstrap.Modal.getInstance(document.getElementById('meetingModal')).hide();
            loadMeetings();
        } catch (err) {
            alert(err.message);
        }
    }
    
    // Add edit/delete stubs as needed...
</script>
    <script src="assets/js/responsive.js"></script>
</body>
</html>
