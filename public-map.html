<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOOD GOV Citizen - แผนที่เมืองอัจฉริยะ</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <link rel="apple-touch-icon" href="assets/images/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/public-map.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <i class="fa-solid fa-map-location-dot text-6xl text-white mb-4"></i>
            <h1 class="text-3xl font-bold text-white mb-2">GOOD GOV</h1>
            <p class="text-white text-opacity-80">Citizen Smart Map</p>
            <div class="spinner-border text-light mt-4" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div class="app-container">
        <!-- Top Bar (Glassmorphism) -->
        <header class="top-bar glass-panel">
            <div class="d-flex justify-content-between align-items-center w-100">
                <div class="d-flex align-items-center gap-3">
                    <a href="index.html" class="btn btn-sm btn-icon"><i class="fa-solid fa-arrow-left text-white"></i></a>
                    <div>
                        <h1 class="h6 mb-0 text-white font-bold" style="letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px;">
                            <img src="assets/images/logo.png" style="width: 20px; height: 20px; object-fit: contain; filter: brightness(0) invert(1);" onerror="this.style.display='none'">
                            แผนที่เมืองอัจฉริยะ
                        </h1>
                        <p class="text-white text-opacity-70 mb-0" style="font-size: 0.7rem; font-family: sans-serif; letter-spacing: 0.5px;">Smart City Map (Public GIS)</p>
                    </div>
                </div>
                <div class="d-md-none"> <!-- Only show GPS on mobile here, on desktop we can put it elsewhere or keep it -->
                    <button class="btn btn-sm btn-icon" onclick="locateUser()"><i class="fa-solid fa-location-crosshairs text-white"></i></button>
                </div>
            </div>
        </header>

        <!-- Search Bar Overlay -->
        <div class="search-overlay glass-panel collapsed" id="searchOverlay">
            <div class="input-group flex-nowrap">
                <span class="input-group-text bg-transparent border-0 text-white opacity-90 cursor-pointer" id="searchToggleBtn"><i class="fa-solid fa-magnifying-glass"></i></span>
                <input type="text" class="form-control bg-transparent border-0 text-white shadow-none placeholder-white search-input-field" placeholder="ค้นหาสถานที่ พิกัด หรือชื่อถนน..." id="searchInput">
                <button class="btn border-0 text-white opacity-70 d-none d-md-block search-action-btn" onclick="locateUser()" title="My Location"><i class="fa-solid fa-location-crosshairs"></i></button>
            </div>
        </div>

        <!-- The Map -->
        <div id="publicMap" class="map-container"></div>

        <!-- Dashboard Widgets (Hidden on small mobile, visible on tablet/desktop, or toggled) -->
        <div class="dashboard-widgets glass-panel d-none d-md-flex flex-column gap-2">
            <h6 class="text-white font-bold text-sm border-b border-white border-opacity-20 pb-2 mb-1"><i class="fa-solid fa-chart-pie me-1"></i> ภาพรวมโครงสร้างพื้นฐาน</h6>
            <div class="d-flex justify-content-between align-items-center text-white text-sm">
                <span><i class="fa-solid fa-road text-warning me-1"></i> ถนน/ซอย</span>
                <span id="stat-roads" class="font-bold">...</span>
            </div>
            <div class="d-flex justify-content-between align-items-center text-white text-sm">
                <span><i class="fa-solid fa-bolt text-yellow-300 me-1"></i> ไฟฟ้าส่องสว่าง</span>
                <span id="stat-lighting" class="font-bold">...</span>
            </div>
            <div class="d-flex justify-content-between align-items-center text-white text-sm">
                <span><i class="fa-solid fa-water text-info me-1"></i> แหล่งน้ำ</span>
                <span id="stat-water" class="font-bold">...</span>
            </div>
            <div class="d-flex justify-content-between align-items-center text-white text-sm">
                <span><i class="fa-solid fa-building text-success me-1"></i> สถานที่ราชการ</span>
                <span id="stat-publicland" class="font-bold">...</span>
            </div>
        </div>

        <!-- Bottom Navigation / Layer Toggle -->
        <div class="bottom-sheet glass-panel">
            <div class="drag-handle"></div>
            <div class="d-flex justify-content-between align-items-center mb-3 px-3">
                <h5 class="text-white font-bold mb-0">หมวดหมู่ข้อมูลสาธารณะ</h5>
                <button id="toggleLayerGridBtn" class="btn btn-sm btn-link text-slate-300 hover:text-white p-0">
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            <div class="layer-grid px-2 pb-4">
                <button class="layer-btn active" data-layer="boundarySubdistrict">
                    <i class="fa-solid fa-draw-polygon text-purple-600"></i>
                    <span>แนวเขตตำบล</span>
                </button>
                <button class="layer-btn active" data-layer="boundaryMarker">
                    <i class="fa-solid fa-location-pin text-indigo-600"></i>
                    <span>หมุดหลักเขต</span>
                </button>
                <button class="layer-btn active" data-layer="boundaryVillage">
                    <i class="fa-solid fa-draw-polygon text-emerald-600"></i>
                    <span>ขอบเขตหมู่บ้าน</span>
                </button>
                <button class="layer-btn active" data-layer="roads">
                    <i class="fa-solid fa-road text-danger"></i>
                    <span>ทะเบียนถนนสายทาง</span>
                </button>
                <button class="layer-btn active" data-layer="plannedRoads">
                    <i class="fa-solid fa-road-circle-exclamation text-warning"></i>
                    <span>ถนนในแผนพัฒนา</span>
                </button>
                <button class="layer-btn active" data-layer="lighting">
                    <i class="fa-solid fa-bolt text-warning"></i>
                    <span>ไฟฟ้าส่องสว่าง</span>
                </button>
                <button class="layer-btn active" data-layer="water">
                    <i class="fa-solid fa-circle text-sky-500"></i>
                    <span>แหล่งน้ำ & สระ</span>
                </button>
                <button class="layer-btn active" data-layer="waterways">
                    <i class="fa-solid fa-droplet text-sky-600"></i>
                    <span>ลำคลอง & ลำห้วย</span>
                </button>
                <button class="layer-btn active" data-layer="drainage">
                    <i class="fa-solid fa-circle text-emerald-500"></i>
                    <span>ราง & ฝาท่อระบายน้ำ</span>
                </button>
                <button class="layer-btn active" data-layer="publicLand">
                    <i class="fa-solid fa-square text-success"></i>
                    <span>ที่ดินสาธารณะ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Supabase Connection & Existing Services -->
    <script src="assets/js/supabase-client.js"></script>
    <script src="services/gisSpatialService.js"></script>
    <script src="services/waterSpatialService.js"></script>
    <script src="services/publicLandSpatialService.js"></script>
    <script src="services/boundarySpatialService.js"></script>
    <script src="assets/js/digital-infrastructure.js"></script>
    
    <!-- Public Map Logic -->
    <script src="assets/js/public-map.js"></script>
    
    <!-- PWA Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('ServiceWorker registration successful');
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
