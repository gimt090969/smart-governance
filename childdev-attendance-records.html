<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลรายการเช็คชื่อ - ศูนย์พัฒนาเด็กเล็ก</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .att-row-present{background:rgba(16,185,129,0.05);}
        .att-row-late{background:rgba(245,158,11,0.05);}
        .att-row-absent{background:rgba(239,68,68,0.05);}
        .att-row-pending{background:#fff;}
        .att-photo-sm{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #10b981;cursor:pointer}
        .att-avatar-sm{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;flex-shrink:0}
        .manual-select{width:140px;font-size:0.8rem;padding:4px 8px;border-radius:8px;}
        .room-section{margin-bottom:2rem;}
        .room-header{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border-radius:12px 12px 0 0;color:#fff;font-weight:600;}
    </style>
</head>
<body>
<nav id="sidebar"></nav>
<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="ข้อมูลรายการเช็คชื่อ"></div>
    <div class="page-content">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-clipboard-list text-primary me-2"></i>ข้อมูลรายการเช็คชื่อ</h4>
                <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                    <li class="breadcrumb-item"><a href="childdev-dashboard.html" class="text-decoration-none">ศูนย์พัฒนาเด็กเล็ก</a></li>
                    <li class="breadcrumb-item active">ข้อมูลรายการเช็คชื่อ</li>
                </ol></nav>
            </div>
            <div class="d-flex gap-2 flex-wrap align-items-center">
                <input type="date" class="form-control form-control-sm" id="filterDate" style="width:auto;" onchange="loadRecords()">
                <select class="form-select form-select-sm" id="filterRoom" style="width:auto;" onchange="loadRecords()">
                    <option value="">ทุกห้อง</option>
                </select>
                <button class="btn btn-sm btn-success" onclick="saveAllManual()"><i class="fa-solid fa-save me-1"></i>บันทึกทั้งหมด</button>
                <button class="btn btn-sm btn-outline-secondary" onclick="printRecords()"><i class="fa-solid fa-print me-1"></i>พิมพ์</button>
            </div>
        </div>

        <!-- Summary KPIs -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">นักเรียนทั้งหมด</div><div class="kpi-value" id="kpiTotal">-</div></div><div class="kpi-icon bg-primary bg-opacity-10 text-primary"><i class="fa-solid fa-child"></i></div></div></div></div>
            <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">มาเรียน (สแกน+มือ)</div><div class="kpi-value text-success" id="kpiChecked">-</div></div><div class="kpi-icon bg-success bg-opacity-10 text-success"><i class="fa-solid fa-circle-check"></i></div></div></div></div>
            <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">ยังไม่เช็คชื่อ</div><div class="kpi-value text-warning" id="kpiPending">-</div></div><div class="kpi-icon bg-warning bg-opacity-10 text-warning"><i class="fa-solid fa-hourglass-half"></i></div></div></div></div>
            <div class="col-6 col-xl-3"><div class="kpi-card"><div class="d-flex justify-content-between"><div><div class="kpi-label">ขาด/ลา</div><div class="kpi-value text-danger" id="kpiAbsent">-</div></div><div class="kpi-icon bg-danger bg-opacity-10 text-danger"><i class="fa-solid fa-user-xmark"></i></div></div></div></div>
        </div>

        <!-- Records grouped by room -->
        <div id="recordsContainer"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/childdev.js"></script>
<script>
let manualChanges = {};

document.addEventListener('DOMContentLoaded', function() {
    // Auto-heal: ถ้าไม่มีข้อมูลให้ reset ใหม่
    const testStudents = ChilddevDB.getAll('students');
    const testRooms = ChilddevDB.getAll('classrooms');
    console.log('📊 Students:', testStudents.length, '| Rooms:', testRooms.length);
    if (testStudents.length === 0 || testRooms.length === 0) {
        console.log('⚠️ No data found, force resetting...');
        ChilddevDB.forceReset();
    }

    document.getElementById('filterDate').value = childdevGetTodayStr();
    const rooms = ChilddevDB.getAll('classrooms');
    const sel = document.getElementById('filterRoom');
    rooms.forEach(r => { sel.innerHTML += `<option value="${r.id}">${r.name}</option>`; });
    loadRecords();
});

function loadRecords() {
    manualChanges = {};
    const date = document.getElementById('filterDate').value || childdevGetTodayStr();
    const roomFilter = document.getElementById('filterRoom').value;

    const allStudents = ChilddevDB.getAll('students').filter(s => s.status === 'กำลังศึกษา');
    const attendance = ChilddevDB.getAll('attendance').filter(a => a.date === date);
    let rooms = ChilddevDB.getAll('classrooms');
    if (roomFilter) rooms = rooms.filter(r => r.id === roomFilter);

    let totalAll = 0, totalChecked = 0, totalPending = 0, totalAbsent = 0;
    const container = document.getElementById('recordsContainer');
    let html = '';

    rooms.forEach(rm => {
        const roomStudents = allStudents.filter(s => s.classroomId === rm.id);
        roomStudents.sort((a,b) => a.firstName.localeCompare(b.firstName));
        const roomChecked = roomStudents.filter(s => attendance.find(a => a.studentId === s.id && (a.status === 'มาเรียน' || a.status === 'มาสาย'))).length;
        const roomAbsent = roomStudents.filter(s => { const a = attendance.find(at => at.studentId === s.id); return a && (a.status === 'ขาดเรียน' || a.status === 'ลาป่วย' || a.status === 'ลากิจ'); }).length;
        const roomPending = roomStudents.length - roomChecked - roomAbsent;

        totalAll += roomStudents.length;
        totalChecked += roomChecked;
        totalPending += roomPending;
        totalAbsent += roomAbsent;

        html += `<div class="card room-section fade-in-up">
            <div class="room-header" style="background:${rm.color};">
                <span style="font-size:1.3rem;">${rm.icon || '📚'}</span>
                <span>${rm.name} — ${rm.teacher}</span>
                <span class="ms-auto badge bg-white text-dark">${roomChecked}/${roomStudents.length} คน</span>
                <button class="btn btn-xs btn-light ms-1" onclick="markRoomPresent('${rm.id}')"><i class="fa-solid fa-check text-success me-1"></i>เช็คมาทั้งหมด</button>
                <button class="btn btn-xs btn-light ms-1" onclick="markRoomAbsent('${rm.id}')"><i class="fa-solid fa-xmark text-danger me-1"></i>เช็คขาดที่เหลือ</button>
            </div>
            <div class="card-body p-0"><div class="table-container">
                <table class="table table-hover mb-0">
                    <thead><tr>
                        <th class="ps-3" style="width:35px;">#</th>
                        <th style="width:50px;">ภาพ</th>
                        <th>ชื่อ-สกุล</th>
                        <th>เวลาเข้า</th>
                        <th>วิธี</th>
                        <th style="width:160px;">สถานะ</th>
                        <th style="width:130px;">หมายเหตุ</th>
                    </tr></thead>
                    <tbody>${roomStudents.map((s, i) => renderStudentRow(s, i, attendance, rm)).join('')}</tbody>
                </table>
            </div></div>
        </div>`;
    });

    container.innerHTML = html || '<div class="text-center text-muted py-5">ไม่มีข้อมูล</div>';
    document.getElementById('kpiTotal').textContent = totalAll;
    document.getElementById('kpiChecked').textContent = totalChecked;
    document.getElementById('kpiPending').textContent = totalPending;
    document.getElementById('kpiAbsent').textContent = totalAbsent;
}

function renderStudentRow(s, i, attendance, rm) {
    const att = attendance.find(a => a.studentId === s.id);
    const status = att?.status || '';
    const hasRecord = !!att;
    const isPresent = status === 'มาเรียน';
    const isLate = status === 'มาสาย';
    const isAbsent = status === 'ขาดเรียน' || status === 'ลาป่วย' || status === 'ลากิจ';

    let rowClass = 'att-row-pending';
    if (isPresent) rowClass = 'att-row-present';
    else if (isLate) rowClass = 'att-row-late';
    else if (isAbsent) rowClass = 'att-row-absent';

    // Photo
    let photoHtml;
    if (att?.snapshot) {
        photoHtml = `<img src="${att.snapshot}" class="att-photo-sm" onclick="viewSnapshot(this.src,'${s.prefix}${s.firstName} ${s.lastName}')">`;
    } else {
        photoHtml = `<div class="att-avatar-sm" style="background:${rm.color}">${s.gender === 'ชาย' ? '👦' : '👧'}</div>`;
    }

    // Method
    let methodHtml = '<span class="text-xs text-muted">—</span>';
    if (att?.method === 'face') methodHtml = '<i class="fa-solid fa-face-smile text-success"></i> <span class="text-xs">สแกนใบหน้า</span>';
    else if (att?.method === 'manual') methodHtml = '<i class="fa-solid fa-pen text-primary"></i> <span class="text-xs">บันทึกมือ</span>';

    // Status
    let statusHtml;
    if (hasRecord) {
        const badgeMap = { 'มาเรียน': 'bg-success', 'มาสาย': 'bg-warning text-dark', 'ขาดเรียน': 'bg-danger', 'ลาป่วย': 'bg-secondary', 'ลากิจ': 'bg-info' };
        statusHtml = `<span class="badge ${badgeMap[status] || 'bg-secondary'}">${status}</span>`;
        if (att.confidence) statusHtml += ` <span class="text-xs text-muted">${att.confidence}%</span>`;
        statusHtml += ` <button class="btn btn-xs btn-outline-primary py-0 px-1 ms-1" onclick="editStatus('${att.id}','${s.prefix}${s.firstName} ${s.lastName}','${status}')" title="แก้ไขสถานะ"><i class="fa-solid fa-pen-to-square" style="font-size:0.7rem;"></i></button>`;
    } else {
        statusHtml = `<select class="form-select manual-select" id="manual-${s.id}" onchange="onManualChange('${s.id}',this.value)">
            <option value="">— รอเช็ค —</option>
            <option value="มาเรียน">✅ มาเรียน</option>
            <option value="มาสาย">⏰ มาสาย</option>
            <option value="ขาดเรียน">❌ ขาดเรียน</option>
            <option value="ลาป่วย">🏥 ลาป่วย</option>
            <option value="ลากิจ">📝 ลากิจ</option>
        </select>`;
    }

    // Note
    const noteHtml = hasRecord
        ? `<span class="text-xs text-muted">${att.note || ''}</span>`
        : `<input type="text" class="form-control form-control-sm" style="font-size:0.78rem;" id="note-${s.id}" placeholder="หมายเหตุ">`;

    return `<tr class="${rowClass}">
        <td class="ps-3 text-muted text-sm">${i + 1}</td>
        <td>${photoHtml}</td>
        <td><span class="fw-semibold">${s.prefix}${s.firstName} ${s.lastName}</span> <span class="text-xs text-muted">"${s.nickname}"</span></td>
        <td class="text-sm">${att?.timeIn || '-'}</td>
        <td>${methodHtml}</td>
        <td>${statusHtml}</td>
        <td>${noteHtml}</td>
    </tr>`;
}

function onManualChange(studentId, status) {
    if (status) manualChanges[studentId] = status;
    else delete manualChanges[studentId];
}

function saveAllManual() {
    const date = document.getElementById('filterDate').value || childdevGetTodayStr();
    const keys = Object.keys(manualChanges);
    if (keys.length === 0) { Swal.fire('ไม่มีข้อมูลที่ต้องบันทึก', 'กรุณาเลือกสถานะจาก dropdown ก่อน', 'info'); return; }
    const now = new Date();
    const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    keys.forEach(sid => {
        const existing = ChilddevDB.getAll('attendance').find(a => a.studentId === sid && a.date === date);
        if (!existing) {
            const noteEl = document.getElementById(`note-${sid}`);
            ChilddevDB.add('attendance', {
                id: childdevGenerateId('ATT'), studentId: sid, date,
                status: manualChanges[sid], timeIn: timeStr, method: 'manual',
                recorder: 'บันทึกมือ', confidence: '', snapshot: '',
                note: noteEl?.value || ''
            });
        }
    });
    manualChanges = {};
    loadRecords();
    Swal.fire({ icon: 'success', title: `บันทึกสำเร็จ ${keys.length} รายการ`, timer: 1500, showConfirmButton: false });
}

function markRoomPresent(roomId) {
    const date = document.getElementById('filterDate').value || childdevGetTodayStr();
    const students = ChilddevDB.getAll('students').filter(s => s.classroomId === roomId && s.status === 'กำลังศึกษา');
    const attendance = ChilddevDB.getAll('attendance').filter(a => a.date === date);
    const unchecked = students.filter(s => !attendance.find(a => a.studentId === s.id));
    if (unchecked.length === 0) { Swal.fire('เช็คชื่อครบแล้ว', 'นักเรียนทุกคนในห้องนี้เช็คชื่อแล้ว', 'info'); return; }
    Swal.fire({ title: 'เช็คมาเรียน ' + unchecked.length + ' คน?', text: 'นักเรียนที่ยังไม่เช็คจะถูกบันทึกเป็นมาเรียน', icon: 'question', showCancelButton: true, confirmButtonColor: '#10b981', confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก' }).then(r => {
        if (!r.isConfirmed) return;
        const now = new Date();
        const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        unchecked.forEach(s => {
            ChilddevDB.add('attendance', {
                id: childdevGenerateId('ATT'), studentId: s.id, date,
                status: 'มาเรียน', timeIn: timeStr, method: 'manual',
                recorder: 'บันทึกมือ', confidence: '', snapshot: '', note: ''
            });
        });
        loadRecords();
        Swal.fire({ icon: 'success', title: 'บันทึกมาเรียน ' + unchecked.length + ' คน', timer: 1500, showConfirmButton: false });
    });
}

function markRoomAbsent(roomId) {
    const date = document.getElementById('filterDate').value || childdevGetTodayStr();
    const students = ChilddevDB.getAll('students').filter(s => s.classroomId === roomId && s.status === 'กำลังศึกษา');
    const attendance = ChilddevDB.getAll('attendance').filter(a => a.date === date);
    const unchecked = students.filter(s => !attendance.find(a => a.studentId === s.id));
    if (unchecked.length === 0) { Swal.fire('เช็คชื่อครบแล้ว', 'นักเรียนทุกคนในห้องนี้เช็คชื่อแล้ว', 'info'); return; }
    Swal.fire({ title: 'เช็คขาดเรียน ' + unchecked.length + ' คน?', text: 'นักเรียนที่ยังไม่เช็คจะถูกบันทึกเป็นขาดเรียน', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก' }).then(r => {
        if (!r.isConfirmed) return;
        unchecked.forEach(s => {
            ChilddevDB.add('attendance', {
                id: childdevGenerateId('ATT'), studentId: s.id, date,
                status: 'ขาดเรียน', timeIn: '', method: 'manual',
                recorder: 'บันทึกมือ', confidence: '', snapshot: '', note: ''
            });
        });
        loadRecords();
        Swal.fire({ icon: 'success', title: 'บันทึกขาดเรียน ' + unchecked.length + ' คน', timer: 1500, showConfirmButton: false });
    });
}

function editStatus(attId, studentName, currentStatus) {
    Swal.fire({
        title: 'แก้ไขสถานะ',
        html: '<p class="mb-2"><b>' + studentName + '</b></p>' +
            '<select id="swalEditStatus" class="form-select">' +
            '<option value="มาเรียน"' + (currentStatus === 'มาเรียน' ? ' selected' : '') + '>✅ มาเรียน</option>' +
            '<option value="มาสาย"' + (currentStatus === 'มาสาย' ? ' selected' : '') + '>⏰ มาสาย</option>' +
            '<option value="ขาดเรียน"' + (currentStatus === 'ขาดเรียน' ? ' selected' : '') + '>❌ ขาดเรียน</option>' +
            '<option value="ลาป่วย"' + (currentStatus === 'ลาป่วย' ? ' selected' : '') + '>🏥 ลาป่วย</option>' +
            '<option value="ลากิจ"' + (currentStatus === 'ลากิจ' ? ' selected' : '') + '>📝 ลากิจ</option>' +
            '</select>',
        showCancelButton: true,
        confirmButtonText: 'บันทึก',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#1a56db',
        preConfirm: function() {
            return document.getElementById('swalEditStatus').value;
        }
    }).then(function(result) {
        if (!result.isConfirmed) return;
        var newStatus = result.value;
        ChilddevDB.update('attendance', attId, { status: newStatus });
        loadRecords();
        Swal.fire({ icon: 'success', title: 'แก้ไขเป็น ' + newStatus, timer: 1200, showConfirmButton: false });
    });
}

function viewSnapshot(src, name) {
    Swal.fire({ title: name, imageUrl: src, imageWidth: 480, imageAlt: name, confirmButtonText: 'ปิด', showDenyButton: true, denyButtonText: '<i class="fa-solid fa-download"></i> ดาวน์โหลด', customClass: { image: 'rounded-3' } }).then(r => {
        if (r.isDenied) { const a = document.createElement('a'); a.href = src; a.download = `att_${name}.jpg`; a.click(); }
    });
}

function printRecords() {
    const date = document.getElementById('filterDate').value;
    const content = document.getElementById('recordsContainer').innerHTML;
    const dateLabel = childdevFormatDate(date);
    const w = window.open('', '_blank');
    var html = '<!DOCTYPE html><html><head><title>รายการเช็คชื่อ ' + dateLabel + '</' + 'title>';
    html += '<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">';
    html += '<style>body{font-family:Prompt,sans-serif;padding:1.5rem;}table{width:100%;border-collapse:collapse;margin-bottom:1.5rem;}th,td{padding:5px 8px;border:1px solid #ddd;font-size:11px;}th{background:#f3f4f6;font-weight:600;}h2{font-size:16px;color:#1a56db;}select,input,.att-photo-sm,.att-avatar-sm{display:none!important;}</' + 'style>';
    html += '</' + 'head><body><h2>รายการเช็คชื่อ — ' + dateLabel + '</' + 'h2>' + content + '</' + 'body></' + 'html>';
    w.document.write(html);
    w.document.close(); w.print();
}
</script>
<script src="assets/js/responsive.js"></script>
</body>
</html>
