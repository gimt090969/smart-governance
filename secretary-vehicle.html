<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขอใช้รถราชการส่วนกลาง - Smart Governance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .vehicle-img { height: 140px; background-color: #f8f9fa; }
        .vehicle-img img { width: 100%; height: 100%; object-fit: cover; }
        .status-available { background: #d1fae5; color: #065f46; }
        .status-inuse { background: #fef3c7; color: #92400e; }
        .status-maintenance { background: #fee2e2; color: #991b1b; }
        .logbook-row { transition: background .15s; }
        .logbook-row:hover { background: #f0f7ff; }
    </style>
</head>
<body>

<nav id="sidebar"></nav>

<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="ระบบจัดการรถยนต์ส่วนกลาง (Smart Vehicles)"></div>

    <div class="page-content">
        
        <!-- Header -->
        <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-car-side text-primary me-2"></i>ระบบจัดสรรรถราชการ</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                        <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none">แดชบอร์ด</a></li>
                        <li class="breadcrumb-item"><a href="secretary.html" class="text-decoration-none">สำนักปลัด</a></li>
                        <li class="breadcrumb-item active">จองรถราชการ</li>
                    </ol>
                </nav>
            </div>
            
            <button onclick="openRequestModal()" class="btn btn-sm btn-primary fw-bold shadow-sm d-flex align-items-center gap-2">
                <i class="fa-solid fa-square-plus"></i> เขียนใบขอใช้รถราชการ
            </button>
        </div>

        <!-- Vehicle Inventory Grid -->
        <h6 class="fw-semibold text-muted mb-3" style="font-size:0.75rem;text-transform:uppercase;">สถานะยานพาหนะส่วนกลางในหน่วยงาน</h6>
        <div class="row g-3 mb-4" id="vehicleListGrid">
            <!-- Loaded dynamically -->
        </div>

        <div class="row g-4">
            
            <!-- Left: Current Requests -->
            <div class="col-lg-8">
                <div class="card h-100">
                    <div class="card-header bg-transparent border-0 pb-0">
                        <h6 class="fw-bold text-dark mb-0"><i class="fa-solid fa-clipboard-list text-primary me-2"></i> รายการคำขอจองและจัดสรรรถยนต์</h6>
                    </div>
                    <div class="card-body overflow-auto" style="max-height: 550px;">
                        <div class="d-flex flex-column gap-3" id="requestsListContainer">
                            <div class="text-center py-5 text-muted">กำลังโหลดข้อมูล...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Logbook -->
            <div class="col-lg-4">
                <div class="card h-100">
                    <div class="card-header bg-transparent border-0 pb-0">
                        <h6 class="fw-bold text-dark mb-0"><i class="fa-solid fa-book-open text-primary me-2"></i> บันทึกผลสมุดไมล์รถราชการ (Logbook)</h6>
                    </div>
                    <div class="card-body">
                        <form id="logbookForm" class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">เลือกรถยนต์ที่ใช้งาน <span class="text-danger">*</span></label>
                                <select id="logVehicle" required class="form-select" style="font-size:0.85rem;"></select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">ชื่อผู้ขับขี่จริง</label>
                                <input type="text" id="logDriver" class="form-control" style="font-size:0.85rem;" placeholder="เช่น นายประสิทธิ์ ล้อหมุน">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">เลขไมล์ออกตัว <span class="text-danger">*</span></label>
                                <input type="number" id="logMileageOut" required class="form-control" style="font-size:0.85rem;" placeholder="เช่น 12500">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">เลขไมล์กลับถึง <span class="text-danger">*</span></label>
                                <input type="number" id="logMileageIn" required class="form-control" style="font-size:0.85rem;" placeholder="เช่น 12620">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">เติมน้ำมันเพิ่ม (ลิตร)</label>
                                <input type="number" step="0.01" id="logFuel" class="form-control" style="font-size:0.85rem;" placeholder="ถ้าเติมกรอกจำนวน">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">ผู้ควบคุม/ผู้ใช้</label>
                                <input type="text" id="logUser" class="form-control" style="font-size:0.85rem;" placeholder="เช่น ปลัดบรรเจิด">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">ปัญหาอาการขัดข้อง/หมายเหตุ</label>
                                <textarea id="logRemark" rows="2" class="form-control" style="font-size:0.85rem;" placeholder="เครื่องปรับอากาศทำงานช้า หรือยางรถมีปัญหารั่ว..."></textarea>
                            </div>
                            <div class="col-12 mt-3">
                                <button type="button" onclick="submitLogbook()" class="btn btn-dark w-100 fw-bold shadow-sm">
                                    บันทึกสมุดประวัติกิโลเมตร
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<!-- Request Modal -->
<div class="modal fade" id="requestModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header bg-primary text-white border-0">
                <div class="d-flex flex-column">
                    <h5 class="modal-title fw-bold">ใบขออนุญาตขอใช้รถยนต์ส่วนกลาง</h5>
                    <small class="text-white-50">ยื่นเสนอขอใช้รถราชการส่วนกลางเพื่อเดินทางปฏิบัติงานภายนอกสถานที่</small>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body bg-light p-4">
                <form id="requestForm" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">วัตถุประสงค์การใช้เดินทาง <span class="text-danger">*</span></label>
                        <input type="text" id="reqPurpose" required class="form-control" placeholder="เช่น เข้าร่วมประชุมการวางผังที่ว่าการอำเภอ">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">ปลายทางที่จะไป <span class="text-danger">*</span></label>
                        <input type="text" id="reqDest" required class="form-control" placeholder="เช่น ที่ว่าการอำเภอเมืองนครนายก">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">วันเวลาออกเดินทาง <span class="text-danger">*</span></label>
                        <input type="datetime-local" id="reqDepart" required class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">วันเวลาสิ้นสุดการเดินทาง <span class="text-danger">*</span></label>
                        <input type="datetime-local" id="reqReturn" required class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">จำนวนผู้โดยสาร (คน)</label>
                        <input type="number" id="reqPassengersCount" value="1" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">รายชื่อผู้โดยสารร่วมเดินทาง</label>
                        <input type="text" id="reqPassengersList" class="form-control" placeholder="เช่น ช่างมานพ, น.ส.อุไร กองคลัง">
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light fw-bold text-muted" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" onclick="submitRequest()" class="btn btn-primary fw-bold px-4">
                    ส่งเสนอขออนุมัติ
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
    // ==========================================
    // LOCAL STORAGE DB for Vehicles
    // ==========================================
    const VehicleDB = {
        _key: 'sec_vehicle_db',
        _load() { try { return JSON.parse(localStorage.getItem(this._key)) || {}; } catch { return {}; } },
        _save(db) { localStorage.setItem(this._key, JSON.stringify(db)); },
        getAll(col) { return this._load()[col] || []; },
        getById(col, id) { return this.getAll(col).find(i => i.id === id); },
        add(col, item) { const db = this._load(); if (!db[col]) db[col] = []; db[col].push(item); this._save(db); return item; },
        update(col, id, updates) { const db = this._load(); const arr = db[col] || []; const idx = arr.findIndex(i => i.id === id); if (idx !== -1) { arr[idx] = {...arr[idx], ...updates}; this._save(db); } },
        remove(col, id) { const db = this._load(); db[col] = (db[col] || []).filter(i => i.id !== id); this._save(db); },

        initDemoData() {
            if (this.getAll('vehicles').length > 0) return;

            // Demo vehicles
            const vehicles = [
                { id: 'v1', license_plate: 'กค 1234 นย', brand: 'Toyota', model: 'Hilux Revo', vehicle_type: 'กระบะ', status: 'ว่าง', last_mileage: 45230, image_url: 'https://images.unsplash.com/photo-1559416523-140ddc3d238c?w=400' },
                { id: 'v2', license_plate: 'ขข 5678 นย', brand: 'Toyota', model: 'Innova', vehicle_type: 'รถตู้', status: 'ใช้งานอยู่', last_mileage: 78120, image_url: 'https://images.unsplash.com/photo-1549317661-bd32c8ce0afe?w=400' },
                { id: 'v3', license_plate: 'จจ 9012 นย', brand: 'Isuzu', model: 'D-Max', vehicle_type: 'กระบะ', status: 'ว่าง', last_mileage: 32100, image_url: 'https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=400' },
                { id: 'v4', license_plate: 'ษฮ 3456 นย', brand: 'Honda', model: 'City', vehicle_type: 'เก๋ง', status: 'ซ่อมบำรุง', last_mileage: 89500, image_url: 'https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?w=400' }
            ];
            vehicles.forEach(v => this.add('vehicles', v));

            // Demo requests
            const now = new Date();
            const requests = [
                {
                    id: 'req1', staff_id: 's1', requester_name: 'นายทนงศักดิ์ รักไทย', department: 'สำนักปลัด',
                    purpose: 'ประชุมสัมมนาการจัดทำแผนพัฒนาท้องถิ่น', destination: 'ศาลากลางจังหวัดนครนายก',
                    departure_date: new Date(now.getTime() + 86400000).toISOString(),
                    return_date: new Date(now.getTime() + 86400000 + 28800000).toISOString(),
                    vehicle_id: 'v1', vehicle_plate: 'กค 1234 นย',
                    driver_name: 'นายสมศักดิ์ คนขับ',
                    passengers_count: 3, passengers_list: 'น.ส.ดวงใจ, นายบรรเจิด',
                    status: 'อนุมัติแล้ว'
                },
                {
                    id: 'req2', staff_id: 's3', requester_name: 'นายบรรเจิด เกียรติกร', department: 'สำนักปลัด',
                    purpose: 'รับเอกสารจากสำนักงานที่ดิน', destination: 'สำนักงานที่ดินจังหวัด',
                    departure_date: new Date(now.getTime() + 172800000).toISOString(),
                    return_date: new Date(now.getTime() + 172800000 + 14400000).toISOString(),
                    vehicle_id: null, vehicle_plate: null,
                    driver_name: null,
                    passengers_count: 1, passengers_list: null,
                    status: 'รออนุมัติ'
                },
                {
                    id: 'req3', staff_id: 's2', requester_name: 'น.ส.ดวงใจ งามดี', department: 'สำนักปลัด',
                    purpose: 'อบรมหลักสูตรพัฒนาบุคลากร', destination: 'โรงแรมรามาการ์เด้นส์ กรุงเทพฯ',
                    departure_date: new Date(now.getTime() - 259200000).toISOString(),
                    return_date: new Date(now.getTime() - 259200000 + 43200000).toISOString(),
                    vehicle_id: 'v2', vehicle_plate: 'ขข 5678 นย',
                    driver_name: 'นายสมศักดิ์ คนขับ',
                    passengers_count: 5, passengers_list: 'ทนงศักดิ์, บรรเจิด, ปิติ, วิลาวัลย์',
                    status: 'เสร็จสิ้นภารกิจ'
                }
            ];
            requests.forEach(r => this.add('requests', r));

            // Demo logbook entries
            const logbooks = [
                { id: 'log1', vehicle_id: 'v1', vehicle_plate: 'กค 1234 นย', driver_name: 'นายสมศักดิ์ คนขับ', mileage_out: 44980, mileage_in: 45230, distance: 250, fuel_liters: 30, user_name: 'นายทนงศักดิ์ รักไทย', remark: 'ปกติ', date: new Date(now.getTime() - 604800000).toISOString() },
                { id: 'log2', vehicle_id: 'v2', vehicle_plate: 'ขข 5678 นย', driver_name: 'นายสมศักดิ์ คนขับ', mileage_out: 77800, mileage_in: 78120, distance: 320, fuel_liters: 40, user_name: 'น.ส.ดวงใจ งามดี', remark: 'แอร์หลังทำงานไม่เย็น', date: new Date(now.getTime() - 259200000).toISOString() }
            ];
            logbooks.forEach(l => this.add('logbook', l));
        }
    };

    function genId(prefix) { return prefix + '-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5); }

    // ==========================================
    // MAIN LOGIC
    // ==========================================
    let vehicles = [];
    let requests = [];
    let requestModal;

    document.addEventListener('DOMContentLoaded', () => {
        VehicleDB.initDemoData();
        requestModal = new bootstrap.Modal(document.getElementById('requestModal'));
        loadVehicles();
        loadRequests();
    });

    function loadVehicles() {
        vehicles = VehicleDB.getAll('vehicles');
        const grid = document.getElementById('vehicleListGrid');

        grid.innerHTML = vehicles.map(v => {
            const statusMap = { 'ว่าง': 'status-available', 'ใช้งานอยู่': 'status-inuse', 'ซ่อมบำรุง': 'status-maintenance' };
            const statusIcon = { 'ว่าง': 'fa-circle-check', 'ใช้งานอยู่': 'fa-spinner fa-spin', 'ซ่อมบำรุง': 'fa-wrench' };
            return `
                <div class="col-md-4 col-lg-3">
                    <div class="card h-100 shadow-sm border-0 overflow-hidden hover-card">
                        <div class="vehicle-img position-relative">
                            <img src="${v.image_url}" alt="${v.license_plate}">
                            <span class="badge ${statusMap[v.status] || 'bg-secondary'} position-absolute top-0 end-0 m-2 shadow-sm px-2 py-1" style="font-size:.7rem;">
                                <i class="fa-solid ${statusIcon[v.status] || 'fa-question'} me-1"></i>${v.status}
                            </span>
                        </div>
                        <div class="card-body p-3">
                            <h6 class="fw-bold text-dark mb-1" style="font-size:.9rem;">${v.license_plate}</h6>
                            <small class="text-muted fw-bold d-block mb-1"><i class="fa-solid fa-car text-primary opacity-75 me-1"></i>${v.brand} ${v.model} (${v.vehicle_type})</small>
                            <small class="text-muted fw-bold"><i class="fa-solid fa-gauge text-secondary opacity-75 me-1"></i>ไมล์: ${v.last_mileage.toLocaleString()} กม.</small>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // Fill logbook vehicle selector
        const selLog = document.getElementById('logVehicle');
        selLog.innerHTML = `<option value="">-- เลือกรถยนต์ราชการ --</option>` + 
            vehicles.map(v => `<option value="${v.id}">${v.license_plate} - ${v.brand} ${v.model}</option>`).join('');
    }

    function loadRequests() {
        requests = VehicleDB.getAll('requests');
        renderRequests();
    }

    function renderRequests() {
        const container = document.getElementById('requestsListContainer');
        if (!requests || requests.length === 0) {
            container.innerHTML = `<div class="text-center py-5 text-muted"><i class="fa-solid fa-car fa-2x mb-2 d-block opacity-50"></i>ไม่มีใบคำขอจองรถราชการ</div>`;
            return;
        }

        container.innerHTML = requests.sort((a, b) => new Date(b.departure_date) - new Date(a.departure_date)).map(r => {
            const depDate = new Date(r.departure_date).toLocaleString('th-TH', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
            const retDate = new Date(r.return_date).toLocaleString('th-TH', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
            
            const statusStyles = {
                'อนุมัติแล้ว': 'bg-success text-success bg-opacity-10 border-success',
                'เสร็จสิ้นภารกิจ': 'bg-primary text-primary bg-opacity-10 border-primary',
                'รออนุมัติ': 'bg-warning text-dark bg-opacity-10 border-warning'
            };
            const statusClass = statusStyles[r.status] || 'bg-secondary bg-opacity-10 border-secondary';

            return `
                <div class="card border mb-2 hover-card">
                    <div class="card-body p-3">
                        <div class="d-flex align-items-center gap-2 flex-wrap mb-2">
                            <span class="badge border ${statusClass}" style="font-size:.7rem;">${r.status}</span>
                            <small class="text-muted fw-bold"><i class="fa-solid fa-car text-secondary opacity-75 me-1"></i>จัดสรร: ${r.vehicle_plate || 'รอกระบวนการอนุมัติจัดรถ'}</small>
                        </div>
                        <h6 class="fw-bold text-dark mb-2" style="font-size:.88rem;">${r.purpose} &rarr; <span class="text-primary">${r.destination}</span></h6>
                        <small class="text-muted d-block mb-1 fw-semibold"><i class="fa-regular fa-clock me-1"></i>เดินทาง: ${depDate} น. ถึง ${retDate} น. | ผู้โดยสาร: ${r.passengers_count} คน ${r.passengers_list ? '(' + r.passengers_list + ')' : ''}</small>
                        <small class="text-muted d-block fw-semibold"><i class="fa-regular fa-user me-1"></i>ผู้ขอ: ${r.requester_name} | คนขับ: ${r.driver_name || 'รอมอบหมาย'}</small>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openRequestModal() {
        document.getElementById('requestForm').reset();
        requestModal.show();
    }

    function submitRequest() {
        const purpose = document.getElementById('reqPurpose').value;
        const dest = document.getElementById('reqDest').value;
        const depart = document.getElementById('reqDepart').value;
        const ret = document.getElementById('reqReturn').value;

        if (!purpose || !dest || !depart || !ret) {
            return showToast("กรุณากรอกวัตถุประสงค์ ปลายทาง และวันเดินทาง", "warning");
        }

        const user = typeof getSessionUser === 'function' ? getSessionUser() : null;

        VehicleDB.add('requests', {
            id: genId('REQ'),
            staff_id: user ? user.id : 's1',
            requester_name: user ? user.name : 'เจ้าหน้าที่สำนักปลัด',
            department: 'สำนักปลัด',
            purpose, destination: dest,
            departure_date: depart,
            return_date: ret,
            vehicle_id: null, vehicle_plate: null,
            driver_name: null,
            passengers_count: parseInt(document.getElementById('reqPassengersCount').value) || 1,
            passengers_list: document.getElementById('reqPassengersList').value || null,
            status: 'รออนุมัติ'
        });

        showToast("ส่งคำขออนุมัติเบิกรถยนต์ราชการเรียบร้อย", "success");
        requestModal.hide();
        loadRequests();
    }

    function submitLogbook() {
        const vehicleId = document.getElementById('logVehicle').value;
        const driverName = document.getElementById('logDriver').value;
        const milOut = parseInt(document.getElementById('logMileageOut').value);
        const milIn = parseInt(document.getElementById('logMileageIn').value);
        const fuel = parseFloat(document.getElementById('logFuel').value) || 0;
        const userName = document.getElementById('logUser').value;
        const remark = document.getElementById('logRemark').value;

        if (!vehicleId || !milOut || !milIn) {
            return showToast("กรุณากรอกทะเบียนรถและเลขไมล์", "warning");
        }

        const distance = milIn - milOut;
        if (distance < 0) {
            return showToast("เลขไมล์ขากลับต้องมากกว่าขาออก", "danger");
        }

        const vehicle = VehicleDB.getById('vehicles', vehicleId);

        VehicleDB.add('logbook', {
            id: genId('LOG'),
            vehicle_id: vehicleId,
            vehicle_plate: vehicle ? vehicle.license_plate : '',
            driver_name: driverName || 'ไม่ได้ระบุ',
            mileage_out: milOut,
            mileage_in: milIn,
            distance,
            fuel_liters: fuel,
            user_name: userName || '-',
            remark: remark || 'ปกติ',
            date: new Date().toISOString()
        });

        // Update vehicle mileage
        VehicleDB.update('vehicles', vehicleId, { last_mileage: milIn });

        showToast("บันทึกสมุดไมล์เดินทางเรียบร้อย", "success");
        document.getElementById('logbookForm').reset();
        loadVehicles();
    }
</script>
