    <style>
        .month-cell {
            width: 55px;
            text-align: center;
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 6px 4px !important;
            transition: opacity 0.1s ease-in-out, background-color 0.1s ease-in-out;
        }

        .month-paid {
            background: #dcfce7 !important;
            color: #166534;
        }

        .month-unpaid {
            background: #fef2f2 !important;
            color: #991b1b;
        }

        .month-pending {
            background: #fef9c3 !important;
            color: #854d0e;
        }

        .month-exempted {
            background: #f3f4f6 !important;
            color: #4b5563;
        }

        .month-cell:hover {
            opacity: 0.75;
            background-color: #e2e8f0;
        }

        .kor3-summary-card {
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .kor3-summary-card .icon-box {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .kor3-summary-card .value {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .kor3-summary-card .label {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .year-btn {
            border-radius: 20px !important;
            font-weight: 600;
            font-size: 0.82rem;
            padding: 4px 16px;
        }

        .year-btn.active {
            background: linear-gradient(135deg, #1a56db, #3b82f6) !important;
            border-color: #1a56db !important;
            color: #fff !important;
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>
    <script src="assets/js/app.js?v=1781176864661"></script>
    <script src="assets/js/waste.js?v=1781176864661"></script>
    <script src="assets/js/responsive.js"></script>
    <script>
        let kor3SelectedYear = '';
        let kor3CurrentPage = 1;
        const kor3ItemsPerPage = 50; // Optimized for performance

        document.addEventListener('DOMContentLoaded', async function () {
            Swal.fire({
                title: 'กำลังโหลดข้อมูล...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
            try {
                // Show loading state for summary cards
                document.getElementById('kor3Summary').innerHTML = `
                    <div class="col-6 col-lg-3"><div class="kor3-summary-card" style="background:#f0f5ff;">
                        <div class="icon-box" style="background:#dbeafe;color:#1a56db;"><i class="fa-solid fa-users"></i></div>
                        <div><div class="value">-</div><div class="label">ครัวเรือนทั้งหมด</div></div>
                    </div></div>
                    <div class="col-6 col-lg-3"><div class="kor3-summary-card" style="background:#f0fdf4;">
                        <div class="icon-box" style="background:#dcfce7;color:#166534;"><i class="fa-solid fa-check-circle"></i></div>
                        <div><div class="value text-success">-</div><div class="label">ชำระครบทุกเดือน (ครัวเรือน)</div></div>
                    </div></div>
                    <div class="col-6 col-lg-3"><div class="kor3-summary-card" style="background:#fef2f2;">
                        <div class="icon-box" style="background:#fecaca;color:#991b1b;"><i class="fa-solid fa-times-circle"></i></div>
                        <div><div class="value text-danger">-</div><div class="label">มีเดือนค้างชำระ (ครัวเรือน)</div></div>
                    </div></div>
                    <div class="col-6 col-lg-3"><div class="kor3-summary-card" style="background:#f0fdf4;">
                        <div class="icon-box" style="background:#bbf7d0;color:#057a55;"><i class="fa-solid fa-coins"></i></div>
                        <div><div class="value text-success">-</div><div class="label">รายรับปีนี้ (ประมาณ)</div></div>
                    </div></div>
                `;
                
                initWasteData();
                await Promise.all([
                    fetchWasteFeeTypes(),
                    fetchWasteCustomers(),
                    fetchMonthlyStatus()
                ]);
                initYearSelector();
                renderKor3();
                Swal.close();
            } catch (error) {
                console.error("Error during initialization:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถโหลดข้อมูลได้'
                });
            }
        });

        function getCurrentFiscalYear() {
            const now = new Date();
            return String(now.getMonth() >= 9 ? now.getFullYear() + 543 + 1 : now.getFullYear() + 543);
        }

        function initYearSelector() {
            const ms = getMonthlyStatus();
            const cy = getCurrentFiscalYear();
            const cyNum = parseInt(cy);

            // รวบรวมปีงบประมาณทั้งหมดจากข้อมูล
            const yearSet = new Set([String(cyNum - 1), cy, String(cyNum + 1)]);
            Object.values(ms).forEach(customerYears => {
                Object.keys(customerYears).forEach(y => yearSet.add(y));
            });
            // รวม custom years จากระบบรับชำระ
            const customYears = getWasteData('customYears');
            if (Array.isArray(customYears)) customYears.forEach(y => yearSet.add(y));

            const years = Array.from(yearSet).sort();
            kor3SelectedYear = cy; // default = ปีปัจจุบัน

            const btnGroup = document.getElementById('yearBtnGroup');
            btnGroup.innerHTML = years.map(y =>
                `<button type="button" class="btn btn-sm year-btn ${y === kor3SelectedYear ? 'active btn-primary' : 'btn-outline-secondary'}" onclick="selectYear('${y}')">${y}</button>`
            ).join('');
        }

        function selectYear(year) {
            kor3SelectedYear = year;
            // Update button styles
            document.querySelectorAll('#yearBtnGroup .year-btn').forEach(btn => {
                btn.classList.remove('active', 'btn-primary');
                btn.classList.add('btn-outline-secondary');
            });
            event.target.classList.remove('btn-outline-secondary');
            event.target.classList.add('active', 'btn-primary');
            renderKor3();
        }

        function renderKor3() {
            let customers = getWasteCustomers().filter(c => c.status === 'active');
            const ms = getMonthlyStatus();
            const q = (document.getElementById('kor3Search').value || '').toLowerCase();
            const moo = document.getElementById('kor3Moo').value;
            const statusFilter = document.getElementById('kor3Status').value;
            const year = kor3SelectedYear || getCurrentFiscalYear();

            if (q) customers = customers.filter(c => c.name.toLowerCase().includes(q) || c.house_no.includes(q));
            if (moo) customers = customers.filter(c => c.moo === moo);

            // Filter by status within the selected fiscal year
            if (statusFilter === 'has_unpaid') customers = customers.filter(c => {
                const yearData = (ms[c.id] || {})[year] || {};
                return WASTE_MONTH_KEYS.some(mk => yearData[mk] !== 'paid');
            });
            if (statusFilter === 'all_paid') customers = customers.filter(c => {
                const yearData = (ms[c.id] || {})[year] || {};
                return WASTE_MONTH_KEYS.every(mk => yearData[mk] === 'paid');
            });

            // สรุปสถิติ
            const allCustomers = getWasteCustomers().filter(c => c.status === 'active');
            let totalPaid = 0, totalUnpaid = 0, totalPending = 0, totalRevenue = 0;
            let householdsAllPaid = 0, householdsHasUnpaid = 0;
            allCustomers.forEach(c => {
                const yearData = (ms[c.id] || {})[year] || {};
                let customerAllPaid = true;
                WASTE_MONTH_KEYS.forEach(mk => {
                    const monthFee = getFeeForMonth(c.id, mk, year);
                    if (yearData[mk] === 'paid') { totalPaid++; totalRevenue += monthFee; }
                    else if (yearData[mk] === 'pending') { totalPending++; customerAllPaid = false; }
                    else { totalUnpaid++; customerAllPaid = false; }
                });
                if (customerAllPaid) householdsAllPaid++;
                else householdsHasUnpaid++;
            });

            // Render summary cards
            document.getElementById('kor3Summary').innerHTML = `
        <div class="col-6 col-lg-3"><div class="kor3-summary-card" style="background:#f0f5ff;">
            <div class="icon-box" style="background:#dbeafe;color:#1a56db;"><i class="fa-solid fa-users"></i></div>
            <div><div class="value">${allCustomers.length}</div><div class="label">ครัวเรือนทั้งหมด</div></div>
        </div></div>
        <div class="col-6 col-lg-3"><div class="kor3-summary-card" style="background:#f0fdf4;">
            <div class="icon-box" style="background:#dcfce7;color:#166534;"><i class="fa-solid fa-check-circle"></i></div>
            <div><div class="value text-success">${householdsAllPaid}</div><div class="label">ชำระครบทุกเดือน (ครัวเรือน)</div></div>
        </div></div>
        <div class="col-6 col-lg-3"><div class="kor3-summary-card" style="background:#fef2f2;">
            <div class="icon-box" style="background:#fecaca;color:#991b1b;"><i class="fa-solid fa-times-circle"></i></div>
            <div><div class="value text-danger">${householdsHasUnpaid}</div><div class="label">มีเดือนค้างชำระ (ครัวเรือน)</div></div>
        </div></div>
        <div class="col-6 col-lg-3"><div class="kor3-summary-card" style="background:#f0fdf4;">
            <div class="icon-box" style="background:#bbf7d0;color:#057a55;"><i class="fa-solid fa-coins"></i></div>
            <div><div class="value text-success">฿${formatMoney(totalRevenue)}</div><div class="label">รายรับปีนี้ (ประมาณ)</div></div>
        </div></div>
    `;

            // Pagination Logic
            const totalItems = customers.length;
            const totalPages = Math.ceil(totalItems / kor3ItemsPerPage) || 1;
            if (kor3CurrentPage > totalPages) kor3CurrentPage = totalPages;
            
            const startIdx = (kor3CurrentPage - 1) * kor3ItemsPerPage;
            const paginatedCustomers = customers.slice(startIdx, startIdx + kor3ItemsPerPage);

            // Render table
            const tbody = document.getElementById('kor3Body');
            const fyNum = parseInt(year);

            // Count paid/unpaid per month for footer
            const monthPaidCounts = new Array(12).fill(0);
            const monthTotalCounts = new Array(12).fill(0);
            const monthRevenue = new Array(12).fill(0);

            // Note: We use paginatedCustomers for the table view, but the footer can show summary for the current page OR all.
            // Usually footer in enterprise shows summary for ALL filtered data. We will compute footer based on ALL filtered customers.
            customers.forEach(c => {
                const yearData = (ms[c.id] || {})[year] || {};
                const monthFees = WASTE_MONTH_KEYS.map(mk => getFeeForMonth(c.id, mk, year));
                WASTE_MONTH_KEYS.forEach((mk, mi) => {
                    const val = yearData[mk] || 'unpaid';
                    monthTotalCounts[mi]++;
                    if (val === 'paid') { monthPaidCounts[mi]++; monthRevenue[mi] += monthFees[mi]; }
                });
            });

            tbody.innerHTML = paginatedCustomers.map((c, idx) => {
                const yearData = (ms[c.id] || {})[year] || {};
                const customerHistory = getFeeHistory(c.id);
                const hasHistory = customerHistory && customerHistory.length > 0;

                // Calculate fee for each month
                const monthFees = WASTE_MONTH_KEYS.map(mk => getFeeForMonth(c.id, mk, year));
                // Find where fee changes happen
                const feeChangeMonths = [];
                for (let i = 1; i < monthFees.length; i++) {
                    if (monthFees[i] !== monthFees[i-1]) feeChangeMonths.push(i);
                }

                const monthCells = WASTE_MONTH_KEYS.map((mk, mi) => {
                    const val = yearData[mk] || 'unpaid';
                    const cls = val === 'paid' ? 'month-paid' : val === 'pending' ? 'month-pending' : val === 'exempted' ? 'month-exempted' : 'month-unpaid';
                    const icon = val === 'paid' ? '✓' : val === 'pending' ? '◷' : val === 'exempted' ? '-' : '✗';
                    const calYear = mi < 3 ? String(fyNum - 1) : year;
                    const titleText = val === 'paid' ? 'ชำระแล้ว' : val === 'pending' ? 'รออนุมัติ' : val === 'exempted' ? 'ยกเว้นชำระ' : 'ค้างชำระ';
                    const feeText = val === 'exempted' ? '฿0' : `฿${monthFees[mi]}`;
                    // Highlight fee change month
                    const isChangeMonth = feeChangeMonths.includes(mi);
                    const changeStyle = isChangeMonth ? 'border-left: 3px solid #f59e0b !important;' : '';
                    return `<td class="month-cell ${cls}" style="${changeStyle}" onclick="showMonthDetail('${c.id}','${mk}','${WASTE_MONTHS[mi]}','${val}','${year}','${calYear}')" title="${WASTE_MONTHS[mi]} ${calYear.substring(2)} - ${titleText} | ค่าธรรมเนียม: ${feeText}">${icon}<br><span style="font-size:0.55rem;opacity:0.7;">${feeText}</span></td>`;
                }).join('');

                // Fee display: show current fee, or show change indicator
                let feeDisplay = `฿${formatMoney(c.fee)}`;
                if (hasHistory) {
                    const uniqueFees = [...new Set(monthFees)];
                    if (uniqueFees.length > 1) {
                        feeDisplay = `<span title="ค่าธรรมเนียมเปลี่ยนระหว่างปี">฿${uniqueFees.map(f => formatMoney(f)).join('→')}</span>`;
                    }
                }

                return `<tr><td class="ps-3 text-muted">${startIdx + idx + 1}</td><td class="fw-semibold">${c.name}</td><td>${c.house_no} ม.${c.moo}</td><td class="text-end fw-semibold text-primary" style="font-size:0.78rem;">${feeDisplay}</td>${monthCells}</tr>`;
            }).join('') || '<tr><td colspan="16" class="text-center py-4 text-muted">ไม่พบข้อมูล</td></tr>';

            // Render footer with monthly summary (All filtered data)
            const foot = document.getElementById('kor3Foot');
            const footCells = monthPaidCounts.map((paid, mi) => {
                const total = monthTotalCounts[mi];
                const pct = total > 0 ? Math.round((paid / total) * 100) : 0;
                const bg = pct >= 80 ? '#dcfce7' : pct >= 50 ? '#fef9c3' : '#fef2f2';
                const color = pct >= 80 ? '#166534' : pct >= 50 ? '#854d0e' : '#991b1b';
                return `<td class="month-cell" style="background:${bg};color:${color};font-size:0.7rem;">${paid}/${total}<br><span style="font-size:0.65rem;">(${pct}%)</span></td>`;
            }).join('');
            foot.innerHTML = `<tr style="border-top:2px solid #d1d5db;"><td class="ps-3" colspan="4" style="font-size:0.75rem;font-weight:700;background:#f8fafc;">สรุปจำนวนชำระ/ทั้งหมด (ทุกหน้า)</td>${footCells}</tr>`;
            
            renderKor3Pagination(totalItems, totalPages);
        }

        function renderKor3Pagination(totalItems, totalPages) {
            const pageInfo = document.getElementById('kor3PageInfo');
            const pagination = document.getElementById('kor3Pagination');
            
            if (totalItems === 0) {
                pageInfo.innerHTML = 'ไม่พบข้อมูล';
                pagination.innerHTML = '';
                return;
            }

            const startItem = ((kor3CurrentPage - 1) * kor3ItemsPerPage) + 1;
            const endItem = Math.min(kor3CurrentPage * kor3ItemsPerPage, totalItems);
            pageInfo.innerHTML = `แสดง ${startItem} ถึง ${endItem} จากทั้งหมด <span class="fw-bold">${totalItems}</span> รายการ`;

            let paginationHtml = '';
            
            // Previous Button
            paginationHtml += `<li class="page-item ${kor3CurrentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="changeKor3Page(${kor3CurrentPage - 1}); return false;">ก่อนหน้า</a>
            </li>`;

            // Calculate page range to show (max 5 pages)
            let startPage = Math.max(1, kor3CurrentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) {
                startPage = Math.max(1, endPage - 4);
            }

            if (startPage > 1) {
                paginationHtml += `<li class="page-item"><a class="page-link" href="#" onclick="changeKor3Page(1); return false;">1</a></li>`;
                if (startPage > 2) paginationHtml += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                paginationHtml += `<li class="page-item ${i === kor3CurrentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="changeKor3Page(${i}); return false;">${i}</a>
                </li>`;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) paginationHtml += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                paginationHtml += `<li class="page-item"><a class="page-link" href="#" onclick="changeKor3Page(${totalPages}); return false;">${totalPages}</a></li>`;
            }

            // Next Button
            paginationHtml += `<li class="page-item ${kor3CurrentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="changeKor3Page(${kor3CurrentPage + 1}); return false;">ถัดไป</a>
            </li>`;

            pagination.innerHTML = paginationHtml;
        }

        function changeKor3Page(page) {
            kor3CurrentPage = page;
            renderKor3();
            // Scroll to top of table
            document.querySelector('.table-responsive').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showMonthDetail(customerId, monthKey, monthLabel, status, fiscalYear, calYear) {
            const c = getWasteCustomers().find(x => x.id === customerId);
            if (!c) return;

            const monthFee = getFeeForMonth(customerId, monthKey, fiscalYear);
            const statusText = status === 'paid' ? '✅ ชำระแล้ว' : status === 'pending' ? '⏳ รออนุมัติ' : status === 'exempted' ? '➖ ยกเว้นชำระ' : '❌ ค้างชำระ';

            // Fee history info
            let feeHistoryHtml = '';
            const history = getFeeHistory(customerId);
            if (history && history.length > 0) {
                const currentFee = c.fee;
                if (monthFee !== currentFee) {
                    feeHistoryHtml = `<p style="font-size:12px;color:#b45309;"><i class="fa-solid fa-info-circle"></i> ค่าธรรมเนียมปัจจุบัน: ฿${formatMoney(currentFee)} (เดือนนี้ใช้ค่าเดิม ฿${formatMoney(monthFee)})</p>`;
                }
            }

            // ค้นหาข้อมูลการชำระหรือการยกเว้นที่เกี่ยวข้อง
            let paymentInfo = '';
            if (status === 'exempted') {
                const exemptions = typeof getWasteExemptions === 'function' ? getWasteExemptions() : [];
                const relatedExemptions = exemptions.filter(ex => 
                    ex.customer_id === customerId && 
                    ex.fiscal_year === fiscalYear && 
                    Array.isArray(ex.month_keys) && ex.month_keys.includes(monthKey)
                );
                
                if (relatedExemptions.length > 0) {
                    const rp = relatedExemptions[0];
                    paymentInfo = `
                        <hr style="margin:10px 0;">
                        <p style="font-size:12px;color:#6b7280;margin-bottom:6px;">ข้อมูลการยกเว้น</p>
                        <p><b>วันที่ทำรายการ:</b> ${rp.date} ${rp.time || ''}</p>
                        <p><b>หมายเหตุ:</b> <span style="color:#dc2626;font-weight:600;">${rp.reject_reason || '-'}</span></p>
                        <p><b>เจ้าหน้าที่:</b> ${rp.staff || '-'}</p>
                    `;
                }
            } else if (status === 'paid' || status === 'pending') {
                const payments = getWastePayments();
                const monthWithYear = `${monthLabel} ${calYear.substring(2)}`;
                const relatedPayments = payments.filter(p =>
                    p.customer_id === customerId &&
                    p.fiscal_year === fiscalYear && 
                    (Array.isArray(p.month_keys) ? p.month_keys.includes(monthKey) : (Array.isArray(p.months_paid) && p.months_paid.some(m => m.includes(monthLabel))))
                );

                if (relatedPayments.length > 0) {
                    const rp = relatedPayments[0]; // ใบเสร็จล่าสุด
                    paymentInfo = `
                        <hr style="margin:10px 0;">
                        <p style="font-size:12px;color:#6b7280;margin-bottom:6px;">ข้อมูลการชำระ</p>
                        <p><b>เลขใบเสร็จ:</b> <span style="color:#1a56db;font-weight:600;">${rp.receipt_no || '-'}</span></p>
                        <p><b>วันที่ชำระ:</b> ${rp.date} ${rp.time || ''}</p>
                        <p><b>ช่องทาง:</b> ${rp.method}</p>
                        <p><b>เจ้าหน้าที่:</b> ${rp.staff || '-'}</p>
                        <p><b>แหล่งที่มา:</b> ${rp.source === 'citizen-portal' ? '🌐 Citizen Portal' : '🏢 Walk-in เคาน์เตอร์'}</p>
                    `;
                }
            }

            Swal.fire({
                title: `${c.name}`,
                html: `<div style="text-align:left;font-size:14px;">
            <p><b>บ้านเลขที่:</b> ${c.house_no} ม.${c.moo}</p>
            <p><b>เดือน:</b> ${monthLabel} ${calYear.substring(2)} (ปีงบฯ ${fiscalYear})</p>
            <p><b>ค่าธรรมเนียมเดือนนี้:</b> ฿${formatMoney(monthFee)}</p>
            ${feeHistoryHtml}
            <p><b>สถานะ:</b> ${statusText}</p>
            ${paymentInfo}
        </div>`,
                icon: status === 'paid' ? 'success' : status === 'pending' ? 'warning' : status === 'exempted' ? 'info' : 'error',
                confirmButtonText: 'ปิด',
                showCancelButton: status === 'unpaid',
                cancelButtonText: status === 'unpaid' ? 'ไปหน้ารับชำระ' : '',
                cancelButtonColor: '#057a55'
            }).then(result => {
                if (result.dismiss === Swal.DismissReason.cancel && status === 'unpaid') {
                    window.location.href = 'waste-payments.html';
                }
            });
        }

        function printKor3Report() {
            const year = kor3SelectedYear || getCurrentFiscalYear();
            let customers = getWasteCustomers().filter(c => c.status === 'active');
            const ms = getMonthlyStatus();
            
            // Apply current filters so printed data matches screen
            const q = (document.getElementById('kor3Search').value || '').toLowerCase();
            const moo = document.getElementById('kor3Moo').value;
            const statusFilter = document.getElementById('kor3Status').value;
            
            if (q) customers = customers.filter(c => c.name.toLowerCase().includes(q) || c.house_no.includes(q));
            if (moo) customers = customers.filter(c => c.moo === moo);
            
            if (statusFilter === 'has_unpaid') customers = customers.filter(c => {
                const yearData = (ms[c.id] || {})[year] || {};
                return WASTE_MONTH_KEYS.some(mk => yearData[mk] !== 'paid');
            });
            if (statusFilter === 'all_paid') customers = customers.filter(c => {
                const yearData = (ms[c.id] || {})[year] || {};
                return WASTE_MONTH_KEYS.every(mk => yearData[mk] === 'paid');
            });

            const monthSumsFee = new Array(12).fill(0);
            const monthSumsPaid = new Array(12).fill(0);

            let tbodyHtml = customers.map((c, idx) => {
                const yearData = (ms[c.id] || {})[year] || {};
                let rowHtml = `<tr>
                    <td style="text-align:center;">${idx + 1}</td>
                    <td>${c.name}</td>
                    <td style="text-align:center;">${c.house_no}</td>`;
                    
                WASTE_MONTH_KEYS.forEach((mk, i) => {
                    const monthFee = getFeeForMonth(c.id, mk, year);
                    const val = yearData[mk] || 'unpaid';
                    let paidAmt = 0;
                    if (val === 'paid') paidAmt = monthFee;
                    
                    monthSumsFee[i] += monthFee;
                    monthSumsPaid[i] += paidAmt;
                    
                    rowHtml += `<td style="text-align:center;">${monthFee}</td>
                                <td style="text-align:center;">${paidAmt}</td>`;
                });
                rowHtml += '</tr>';
                return rowHtml;
            }).join('');

            let tfootHtml = `<tr style="font-weight:bold; background-color:#f1f5f9;">
                <td colspan="3" style="text-align:right; padding-right:10px;">รวมทั้งหมด</td>`;
            WASTE_MONTH_KEYS.forEach((mk, i) => {
                tfootHtml += `<td style="text-align:center;">${monthSumsFee[i]}</td>
                              <td style="text-align:center;">${monthSumsPaid[i]}</td>`;
            });
            tfootHtml += '</tr>';

            const localSettings = JSON.parse(localStorage.getItem('waste_settings') || '{}');
            const orgName = localSettings.org_name || 'เทศบาลตำบลเหมืองหม้อ';

            let html = `<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พิมพ์ กค.3 ประจำปีงบประมาณ ${year}</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; padding: 20px; font-size: 12px; color: #000; background: #fff; }
        @media print { 
            @page { size: A4 landscape; margin: 10mm; } 
            body { padding: 0; }
            .print-btn { display: none; }
        }
        h3 { text-align: center; margin-bottom: 20px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 4px 6px; }
        th { background-color: #e2e8f0; font-weight: bold; text-align: center; font-size: 12px; }
        .print-btn { position: fixed; top: 10px; right: 10px; padding: 8px 16px; background: #1a56db; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body>
    <button class="print-btn" onclick="window.print()">พิมพ์ / PDF</button>
    <h3>กค.3 ประจำปีงบประมาณ ${year}<br><span style="font-size: 14px; font-weight: normal;">${orgName}</span></h3>
    <table>
        <thead>
            <tr>
                <th rowspan="2" style="width: 40px;">ลำดับ</th>
                <th rowspan="2" style="min-width: 120px;">ชื่อลูกค้าขยะ</th>
                <th rowspan="2" style="width: 70px;">บ้านเลขที่</th>
                ${WASTE_MONTHS.map(m => `<th colspan="2">${m}</th>`).join('')}
            </tr>
            <tr>
                ${WASTE_MONTHS.map(m => `<th style="font-size: 10px; font-weight: normal; background-color: #f8fafc;">ค่าขยะ ${m}</th><th style="font-size: 10px; font-weight: normal; background-color: #f8fafc;">ชำระ ${m}</th>`).join('')}
            </tr>
        </thead>
        <tbody>
            ${tbodyHtml}
        </tbody>
        <tfoot>
            ${tfootHtml}
        </tfoot>
    </table>
    <script>
        window.onload = function() {
            setTimeout(function() { window.print(); }, 500);
        }
    <\/script>
</body>

            const win = window.open('', '_blank');
            win.document.write(html);
            win.document.close();
        }

        function exportKor3Excel() {
            if (typeof XLSX === 'undefined') {
                Swal.fire('Error', 'ไม่พบไลบรารีสำหรับ Export Excel', 'error');
                return;
            }
            
            const year = kor3SelectedYear || getCurrentFiscalYear();
            let customers = getWasteCustomers().filter(c => c.status === 'active');
            const ms = getMonthlyStatus();
            
            // Apply current filters so exported data matches screen
            const q = (document.getElementById('kor3Search').value || '').toLowerCase();
            const moo = document.getElementById('kor3Moo').value;
            const statusFilter = document.getElementById('kor3Status').value;
            
            if (q) customers = customers.filter(c => c.name.toLowerCase().includes(q) || c.house_no.includes(q));
            if (moo) customers = customers.filter(c => c.moo === moo);
            
            if (statusFilter === 'has_unpaid') customers = customers.filter(c => {
                const yearData = (ms[c.id] || {})[year] || {};
                return WASTE_MONTH_KEYS.some(mk => yearData[mk] !== 'paid');
            });
            if (statusFilter === 'all_paid') customers = customers.filter(c => {
                const yearData = (ms[c.id] || {})[year] || {};
                return WASTE_MONTH_KEYS.every(mk => yearData[mk] === 'paid');
            });

            const monthSumsFee = new Array(12).fill(0);
            const monthSumsPaid = new Array(12).fill(0);
            
            // Header Row 1
            const row1 = ["ลำดับ", "ชื่อลูกค้าขยะ", "บ้านเลขที่"];
            WASTE_MONTHS.forEach(m => {
                row1.push(m);
                row1.push(""); // for colspan
            });
            
            // Header Row 2
            const row2 = ["", "", ""];
            WASTE_MONTHS.forEach(m => {
                row2.push(`ค่าขยะ ${m}`);
                row2.push(`ชำระ ${m}`);
            });
            
            const dataArray = [row1, row2];
            
            customers.forEach((c, idx) => {
                const yearData = (ms[c.id] || {})[year] || {};
                const rowData = [idx + 1, c.name, c.house_no];
                
                WASTE_MONTH_KEYS.forEach((mk, i) => {
                    const monthFee = getFeeForMonth(c.id, mk, year);
                    const val = yearData[mk] || 'unpaid';
                    let paidAmt = 0;
                    if (val === 'paid') paidAmt = monthFee;
                    
                    monthSumsFee[i] += monthFee;
                    monthSumsPaid[i] += paidAmt;
                    
                    rowData.push(monthFee);
                    rowData.push(paidAmt);
                });
                dataArray.push(rowData);
            });
            
            // Footer Row
            const footerRow = ["รวมทั้งหมด", "", ""];
            for(let i=0; i<12; i++) {
                footerRow.push(monthSumsFee[i]);
                footerRow.push(monthSumsPaid[i]);
            }
            dataArray.push(footerRow);

            const ws = XLSX.utils.aoa_to_sheet(dataArray);
            
            // Merges
            ws['!merges'] = [
                { s: { r: 0, c: 0 }, e: { r: 1, c: 0 } }, // ลำดับ
                { s: { r: 0, c: 1 }, e: { r: 1, c: 1 } }, // ชื่อลูกค้าขยะ
                { s: { r: 0, c: 2 }, e: { r: 1, c: 2 } }, // บ้านเลขที่
            ];
            // Merge months in Row 1
            let colIdx = 3;
            WASTE_MONTHS.forEach(() => {
                ws['!merges'].push({ s: { r: 0, c: colIdx }, e: { r: 0, c: colIdx + 1 } });
                colIdx += 2;
            });
            
            // Merge Footer
            ws['!merges'].push({ s: { r: dataArray.length - 1, c: 0 }, e: { r: dataArray.length - 1, c: 2 } });

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, `กค.3_${year}`);
            XLSX.writeFile(wb, `รายงาน_กค3_ปี${year}.xlsx`);
        }
    </script>
</body>

</html>
