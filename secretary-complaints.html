<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>งานร้องเรียน - ระบบบริหารจัดการเทศบาลอัจฉริยะ</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

<nav id="sidebar"></nav>

<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="งานร้องเรียน (Complaint Management)"></div>

    <div class="page-content">
        
        <!-- Header -->
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-4">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-bullhorn text-primary me-2"></i>งานร้องเรียน</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                        <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none">แดชบอร์ด</a></li>
                        <li class="breadcrumb-item"><a href="secretary.html" class="text-decoration-none">สำนักปลัด</a></li>
                        <li class="breadcrumb-item active">งานร้องเรียน</li>
                    </ol>
                </nav>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-3">
                <div class="row g-3">
                    <div class="col-md-8">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-search text-muted"></i></span>
                            <input type="text" id="searchComp" oninput="filterComp()" class="form-control border-start-0 bg-light" placeholder="ค้นหาเรื่องร้องเรียน หรือชื่อผู้ร้อง..." style="font-size:0.85rem;">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select id="filterStatus" onchange="filterComp()" class="form-select bg-light" style="font-size:0.85rem;">
                            <option value="ALL">ทุกสถานะ</option>
                            <option value="รับเรื่อง">รับเรื่อง</option>
                            <option value="กำลังดำเนินการ">กำลังดำเนินการ</option>
                            <option value="เสร็จสิ้น">เสร็จสิ้น</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div id="complaintsList" class="d-flex flex-column gap-3">
            <!-- Loaded via JS -->
            <div class="text-center py-5 text-muted fw-bold" style="font-size:0.85rem;">กำลังโหลดรายการร้องเรียน...</div>
        </div>

    </div>
</div>

<!-- Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white border-0">
                <h6 class="modal-title fw-bold mb-0">อัปเดตสถานะเรื่องร้องเรียน</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 bg-light">
                <form id="statusForm">
                    <label class="form-label fw-bold text-muted mb-1" style="font-size:0.85rem;">เปลี่ยนสถานะเป็น</label>
                    <select id="newStatus" class="form-select" style="font-size:0.85rem;">
                        <option value="รับเรื่อง">รับเรื่อง (Received)</option>
                        <option value="กำลังดำเนินการ">กำลังดำเนินการ (In Progress)</option>
                        <option value="เสร็จสิ้น">เสร็จสิ้น (Resolved)</option>
                        <option value="ยกเลิก">ยกเลิก (Cancelled)</option>
                    </select>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light fw-bold text-muted" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" onclick="updateCompStatus()" class="btn btn-primary fw-bold px-4">บันทึกการเปลี่ยนแปลง</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
<script>
    let allComp = [];
    let currentCompId = null;

    document.addEventListener('DOMContentLoaded', loadComp);

    async function loadComp() {
        try {
            const { data, error } = await supabaseClient.from('complaints').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            allComp = data;
            renderComp(data);
        } catch (err) {
            document.getElementById('complaintsList').innerHTML = `<div class="text-center text-danger fw-bold" style="font-size:0.85rem;">${err.message}</div>`;
        }
    }

    function renderComp(data) {
        const list = document.getElementById('complaintsList');
        if (!data || data.length === 0) {
            list.innerHTML = '<div class="text-center py-5 text-muted fw-bold" style="font-size:0.85rem;">ไม่พบเรื่องร้องเรียน</div>';
            return;
        }

        list.innerHTML = data.map(c => {
            const statusClass = getStatusClass(c.status);
            return `
            <div class="card border-0 shadow-sm hover-card">
                <div class="card-body p-4">
                    <div class="row align-items-center">
                        <div class="col-md-2 mb-3 mb-md-0 text-center">
                            <div class="rounded overflow-hidden bg-light d-flex align-items-center justify-content-center mx-auto" style="width: 100px; height: 100px;">
                                ${c.avatar_url ? `<img src="${c.avatar_url}" class="w-100 h-100 object-fit-cover">` : '<i class="fa-solid fa-image text-muted fs-1 opacity-50"></i>'}
                            </div>
                        </div>
                        <div class="col-md-10">
                            <div class="d-flex justify-content-between align-items-start mb-2 flex-wrap gap-2">
                                <span class="badge border ${statusClass}">${c.status}</span>
                                <small class="text-muted fw-bold" style="font-size:0.75rem;">${new Date(c.created_at).toLocaleDateString('th-TH')}</small>
                            </div>
                            <h6 class="fw-bold text-dark mb-1">${c.title}</h6>
                            <p class="text-muted mb-3" style="font-size:0.85rem;">${c.detail || 'ไม่มีรายละเอียด'}</p>
                            
                            <div class="d-flex align-items-center justify-content-between border-top pt-3">
                                <div class="d-flex align-items-center gap-2">
                                    <div class="rounded-circle bg-secondary bg-opacity-10 text-secondary d-flex align-items-center justify-content-center fw-bold" style="width:24px;height:24px;font-size:0.65rem;">
                                        ${c.citizen_name ? c.citizen_name[0] : '?'}
                                    </div>
                                    <small class="text-muted fw-bold" style="font-size:0.75rem;">${c.citizen_name || 'ไม่ระบุชื่อ'}</small>
                                </div>
                                <button onclick="openStatusModal('${c.id}', '${c.status}')" class="btn btn-sm btn-link text-primary p-0 text-decoration-none fw-bold" style="font-size:0.75rem;">
                                    <i class="fa-solid fa-arrows-rotate me-1"></i> อัปเดตสถานะ
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `}).join('');
    }

    function getStatusClass(status) {
        switch(status) {
            case 'เสร็จสิ้น': return 'bg-success bg-opacity-10 text-success border-success';
            case 'กำลังดำเนินการ': return 'bg-primary bg-opacity-10 text-primary border-primary';
            case 'รับเรื่อง': return 'bg-warning bg-opacity-10 text-dark border-warning';
            default: return 'bg-secondary bg-opacity-10 text-secondary border-secondary';
        }
    }

    function openStatusModal(id, status) {
        currentCompId = id;
        document.getElementById('newStatus').value = status;
        new bootstrap.Modal(document.getElementById('statusModal')).show();
    }

    async function updateCompStatus() {
        const status = document.getElementById('newStatus').value;
        try {
            await supabaseClient.from('complaints').update({ status, updated_at: new Date() }).eq('id', currentCompId);
            bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
            loadComp();
        } catch (err) { alert(err.message); }
    }

    function filterComp() {
        const search = document.getElementById('searchComp').value.toLowerCase();
        const status = document.getElementById('filterStatus').value;
        const filtered = allComp.filter(c => {
            const matchSearch = c.title.toLowerCase().includes(search) || (c.citizen_name && c.citizen_name.toLowerCase().includes(search));
            const matchStatus = status === 'ALL' || c.status === status;
            return matchSearch && matchStatus;
        });
        renderComp(filtered);
    }
</script>
<script src="assets/js/responsive.js"></script>
</body>
</html>
