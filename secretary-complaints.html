<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>งานร้องเรียน - ระบบบริหารจัดการเทศบาลอัจฉริยะ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
    </style>
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="bg-slate-50">

<nav id="sidebar"></nav>

<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="งานร้องเรียน (Complaint Management)"></div>

    <div class="page-content p-4">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">งานร้องเรียน</h1>
                <nav class="flex text-xs text-slate-500 mt-1">
                    <a href="secretary.html" class="hover:text-blue-600 transition">สำนักปลัด</a>
                    <span class="mx-2">/</span>
                    <span class="text-slate-800">งานร้องเรียน</span>
                </nav>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex gap-4">
            <div class="flex-1">
                <input type="text" id="searchComp" oninput="filterComp()" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" placeholder="ค้นหาเรื่องร้องเรียน หรือชื่อผู้ร้อง...">
            </div>
            <select id="filterStatus" onchange="filterComp()" class="bg-slate-50 border border-slate-200 rounded-lg text-sm px-3 py-2">
                <option value="ALL">ทุกสถานะ</option>
                <option value="รับเรื่อง">รับเรื่อง</option>
                <option value="กำลังดำเนินการ">กำลังดำเนินการ</option>
                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
            </select>
        </div>

        <div id="complaintsList" class="space-y-4">
            <!-- Loaded via JS -->
            <div class="text-center py-20 text-slate-400">กำลังโหลดรายการร้องเรียน...</div>
        </div>

    </div>
</div>

<!-- Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-none rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-slate-800 text-white px-6 py-4 flex justify-between items-center">
                <h5 class="font-bold text-lg">อัปเดตสถานะเรื่องร้องเรียน</h5>
                <button type="button" class="text-slate-400 hover:text-white" data-bs-dismiss="modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body p-6">
                <form id="statusForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">เปลี่ยนสถานะเป็น</label>
                        <select id="newStatus" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm">
                            <option value="รับเรื่อง">รับเรื่อง (Received)</option>
                            <option value="กำลังดำเนินการ">กำลังดำเนินการ (In Progress)</option>
                            <option value="เสร็จสิ้น">เสร็จสิ้น (Resolved)</option>
                            <option value="ยกเลิก">ยกเลิก (Cancelled)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-slate-100 border-none px-6 py-4">
                <button type="button" class="px-4 py-2 text-slate-500 font-medium" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" onclick="updateCompStatus()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">บันทึกการเปลี่ยนแปลง</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
<script>
    let allComp = [];
    let currentCompId = null;

    document.addEventListener('DOMContentLoaded', loadComp);

    async function loadComp() {
        try {
            const { data, error } = await supabaseClient.from('complaints').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            allComp = data;
            renderComp(data);
        } catch (err) {
            document.getElementById('complaintsList').innerHTML = `<div class="text-center text-red-500">${err.message}</div>`;
        }
    }

    function renderComp(data) {
        const list = document.getElementById('complaintsList');
        if (!data || data.length === 0) {
            list.innerHTML = '<div class="text-center py-20 text-slate-400">ไม่พบเรื่องร้องเรียน</div>';
            return;
        }

        list.innerHTML = data.map(c => `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row gap-6 hover:shadow-md transition">
                <div class="w-full md:w-32 h-32 flex-shrink-0 bg-slate-100 rounded-xl overflow-hidden flex items-center justify-center">
                    ${c.avatar_url ? `<img src="${c.avatar_url}" class="w-full h-full object-cover">` : '<i class="fa-solid fa-image text-slate-300 text-3xl"></i>'}
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-start mb-2">
                        <span class="px-2 py-1 rounded text-[10px] font-bold ${getStatusClass(c.status)}">
                            ${c.status}
                        </span>
                        <span class="text-xs text-slate-400">${new Date(c.created_at).toLocaleDateString('th-TH')}</span>
                    </div>
                    <h3 class="font-bold text-lg text-slate-800 mb-1">${c.title}</h3>
                    <p class="text-sm text-slate-600 mb-4">${c.detail || 'ไม่มีรายละเอียด'}</p>
                    <div class="flex items-center justify-between border-t border-slate-50 pt-4 mt-auto">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-[10px] font-bold">${c.citizen_name ? c.citizen_name[0] : '?'}</div>
                            <span class="text-xs text-slate-500">${c.citizen_name || 'ไม่ระบุชื่อ'}</span>
                        </div>
                        <button onclick="openStatusModal('${c.id}', '${c.status}')" class="text-blue-600 text-xs font-bold hover:underline">
                            <i class="fa-solid fa-arrows-rotate me-1"></i> อัปเดตสถานะ
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function getStatusClass(status) {
        switch(status) {
            case 'เสร็จสิ้น': return 'bg-green-100 text-green-700';
            case 'กำลังดำเนินการ': return 'bg-blue-100 text-blue-700';
            case 'รับเรื่อง': return 'bg-amber-100 text-amber-700';
            default: return 'bg-slate-100 text-slate-600';
        }
    }

    function openStatusModal(id, status) {
        currentCompId = id;
        document.getElementById('newStatus').value = status;
        new bootstrap.Modal(document.getElementById('statusModal')).show();
    }

    async function updateCompStatus() {
        const status = document.getElementById('newStatus').value;
        try {
            await supabaseClient.from('complaints').update({ status, updated_at: new Date() }).eq('id', currentCompId);
            bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
            loadComp();
        } catch (err) { alert(err.message); }
    }

    function filterComp() {
        const search = document.getElementById('searchComp').value.toLowerCase();
        const status = document.getElementById('filterStatus').value;
        const filtered = allComp.filter(c => {
            const matchSearch = c.title.toLowerCase().includes(search) || (c.citizen_name && c.citizen_name.toLowerCase().includes(search));
            const matchStatus = status === 'ALL' || c.status === status;
            return matchSearch && matchStatus;
        });
        renderComp(filtered);
    }
</script>
    <script src="assets/js/responsive.js"></script>
</body>
</html>
