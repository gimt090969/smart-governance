<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปฏิทินปฏิบัติงานส่วนกลาง - Smart Governance</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FullCalendar CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .fc-header-toolbar {
            padding: 1rem;
            background: #fff;
            border-radius: 0.5rem;
            border: 1px solid #e9ecef;
            box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075);
        }
        .fc-button-primary {
            background-color: #212529 !important;
            border-color: #212529 !important;
            font-size: 0.85rem !important;
            font-weight: bold !important;
            border-radius: 0.375rem !important;
            padding: 0.375rem 0.75rem !important;
        }
        .fc-button-primary:hover {
            background-color: #495057 !important;
            border-color: #495057 !important;
        }
        .fc-button-active {
            background-color: #0d6efd !important;
            border-color: #0d6efd !important;
        }
        .fc-theme-standard td, .fc-theme-standard th {
            border-color: #f8f9fa !important;
        }
        .fc-day-today {
            background-color: #e6f2ff !important;
        }
        .fc-event {
            border: none !important;
            padding: 2px 4px !important;
            border-radius: 4px !important;
            font-weight: bold !important;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1) !important;
            font-size: 0.75rem !important;
        }
    </style>
</head>
<body>

<nav id="sidebar"></nav>

<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="ปฏิทินปฏิบัติงานส่วนกลาง (Smart Calendar)"></div>

    <div class="page-content">
        
        <!-- Header -->
        <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-calendar-days text-primary me-2"></i>ปฏิทินปฏิบัติงานกลาง</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                        <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none">แดชบอร์ด</a></li>
                        <li class="breadcrumb-item"><a href="secretary.html" class="text-decoration-none">สำนักปลัด</a></li>
                        <li class="breadcrumb-item active">ปฏิทินปฏิบัติงาน</li>
                    </ol>
                </nav>
            </div>
            
            <button onclick="openEventModal()" class="btn btn-sm btn-primary fw-bold shadow-sm d-flex align-items-center gap-2">
                <i class="fa-solid fa-plus"></i> เพิ่มกิจกรรม/นัดหมายทั่วไป
            </button>
        </div>

        <div class="row g-4">
            <!-- Left Panel: Legend & Upcoming events list -->
            <div class="col-lg-3 d-flex flex-column gap-4">
                <!-- Color codes legend -->
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-transparent border-0 pb-0">
                        <h6 class="fw-bold text-dark mb-0"><i class="fa-solid fa-sliders text-muted me-2"></i> ตัวกรองภารกิจ</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex flex-column gap-2" style="font-size: 0.8rem;">
                            <div class="d-flex align-items-center justify-content-between bg-light p-2 rounded border">
                                <span class="d-flex align-items-center gap-2 fw-bold text-dark">
                                    <span class="rounded-circle bg-warning" style="width:10px;height:10px;"></span>การจัดประชุม
                                </span>
                                <small class="text-muted fw-bold">จองสำเร็จ</small>
                            </div>
                            <div class="d-flex align-items-center justify-content-between bg-light p-2 rounded border">
                                <span class="d-flex align-items-center gap-2 fw-bold text-dark">
                                    <span class="rounded-circle bg-danger" style="width:10px;height:10px;"></span>วันลาบุคลากร
                                </span>
                                <small class="text-muted fw-bold">ลารายคน</small>
                            </div>
                            <div class="d-flex align-items-center justify-content-between bg-light p-2 rounded border">
                                <span class="d-flex align-items-center gap-2 fw-bold text-dark">
                                    <span class="rounded-circle bg-primary" style="width:10px;height:10px;"></span>ภารกิจสนาม/รถ
                                </span>
                                <small class="text-muted fw-bold">ส่วนกลาง</small>
                            </div>
                            <div class="d-flex align-items-center justify-content-between bg-light p-2 rounded border">
                                <span class="d-flex align-items-center gap-2 fw-bold text-dark">
                                    <span class="rounded-circle bg-success" style="width:10px;height:10px;"></span>วันหยุด/สำคัญ
                                </span>
                                <small class="text-muted fw-bold">ทั่วไป</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Upcoming lists -->
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-transparent border-0 pb-0">
                        <h6 class="fw-bold text-dark mb-0"><i class="fa-solid fa-calendar-day text-primary me-2"></i> นัดหมายเร็วๆ นี้</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex flex-column gap-2" id="upcomingEventsList">
                            <!-- Loaded by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: FullCalendar -->
            <div class="col-lg-9">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body p-4">
                        <div id="calendar"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Event Add Modal -->
<div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-md modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title fw-bold">เพิ่มปฏิทินปฏิบัติงานทั่วไป</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 bg-light">
                <form id="eventForm" class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">หัวข้อภารกิจ/กิจกรรม <span class="text-danger">*</span></label>
                        <input type="text" id="evtTitle" required class="form-control" style="font-size:0.85rem;" placeholder="เช่น กิจกรรม Big Cleaning Day เทศบาล">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">รายละเอียดเพิ่มเติม</label>
                        <textarea id="evtDesc" rows="3" class="form-control" style="font-size:0.85rem;" placeholder="ระบุตารางการประชุมหรือแผนกที่เข้าร่วมหลัก..."></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">เริ่มปฏิบัติภารกิจ <span class="text-danger">*</span></label>
                        <input type="datetime-local" id="evtStart" required class="form-control" style="font-size:0.85rem;">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">เสร็จสิ้นภารกิจ <span class="text-danger">*</span></label>
                        <input type="datetime-local" id="evtEnd" required class="form-control" style="font-size:0.85rem;">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">หมวดหมู่ปฏิทิน</label>
                        <select id="evtType" class="form-select" style="font-size:0.85rem;" onchange="updateEventColorSelector()">
                            <option value="กิจกรรมองค์กร">กิจกรรมองค์กร</option>
                            <option value="วันสำคัญ">วันสำคัญ/วันหยุด</option>
                            <option value="ภารกิจภาคสนาม">ภารกิจภาคสนาม</option>
                            <option value="ประชุม">การประชุมราชการ</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted mb-1" style="font-size:0.8rem;">สีสัญลักษณ์ในปฏิทิน</label>
                        <input type="color" id="evtColor" value="#0d6efd" class="form-control form-control-color w-100" title="Choose your color">
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light fw-bold text-muted" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" onclick="submitEvent()" class="btn btn-primary fw-bold px-4">
                    ลงระบบปฏิทิน
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- FullCalendar JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/secretary-hr.js"></script>
<script>
    let calendar = null;
    let eventsList = [];
    let eventModal;

    document.addEventListener('DOMContentLoaded', () => {
        eventModal = new bootstrap.Modal(document.getElementById('eventModal'));
        initCalendarPlugin();
    });

    async function initCalendarPlugin() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'th',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            buttonText: {
                today: 'วันนี้',
                month: 'รายเดือน',
                week: 'รายสัปดาห์',
                day: 'รายวัน'
            },
            events: async function(info, successCallback, failureCallback) {
                try {
                    const data = await window.secretaryHRService.getCalendarEvents();
                    eventsList = data;
                    
                    const mapped = data.map(item => ({
                        id: item.id,
                        title: item.title,
                        start: item.start_date,
                        end: item.end_date,
                        backgroundColor: item.color_hex,
                        extendedProps: {
                            description: item.description,
                            type: item.event_type
                        }
                    }));
                    successCallback(mapped);
                    renderUpcomingList(data);
                } catch (err) {
                    console.error("Error events source:", err);
                    failureCallback(err);
                }
            },
            eventClick: function(info) {
                alert(`ภารกิจ: ${info.event.title}\nประเภท: ${info.event.extendedProps.type}\nรายละเอียด: ${info.event.extendedProps.description || 'ไม่มี'}`);
            }
        });
        calendar.render();
    }

    function renderUpcomingList(data) {
        const list = document.getElementById('upcomingEventsList');
        const today = new Date();
        today.setHours(0,0,0,0);
        
        const upcoming = data.filter(d => new Date(d.start_date) >= today).slice(0, 4);

        if (upcoming.length === 0) {
            list.innerHTML = `<div class="text-muted fw-bold" style="font-size:0.85rem;">ไม่มีกิจกรรมเร็วๆ นี้</div>`;
            return;
        }

        list.innerHTML = upcoming.map(u => {
            const start = new Date(u.start_date).toLocaleDateString('th-TH', {day:'2-digit', month:'short'});
            return `
                <div class="card border mb-1 hover-card">
                    <div class="card-body p-2 d-flex gap-2 align-items-center">
                        <span class="rounded-circle" style="width: 10px; height: 10px; display: inline-block; background-color: ${u.color_hex || '#0d6efd'}"></span>
                        <div>
                            <h6 class="fw-bold text-dark mb-0" style="font-size:0.8rem; line-height:1.2;">${u.title}</h6>
                            <small class="text-muted fw-bold d-block" style="font-size:0.7rem;"><i class="fa-solid fa-clock me-1"></i>วันที่: ${start}</small>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateEventColorSelector() {
        const type = document.getElementById('evtType').value;
        const color = document.getElementById('evtColor');
        if (type === 'ประชุม') color.value = '#fd7e14';
        else if (type === 'วันสำคัญ') color.value = '#198754';
        else if (type === 'ภารกิจภาคสนาม') color.value = '#0d6efd';
        else color.value = '#6610f2';
    }

    function openEventModal() {
        document.getElementById('eventForm').reset();
        updateEventColorSelector();
        eventModal.show();
    }

    async function submitEvent() {
        const title = document.getElementById('evtTitle').value;
        const start = document.getElementById('evtStart').value;
        const end = document.getElementById('evtEnd').value;
        const type = document.getElementById('evtType').value;
        const color = document.getElementById('evtColor').value;

        if (!title || !start || !end) {
            return showToast("กรุณากรอกหัวข้อกิจกรรม และช่วงเวลาดำเนินการ", "warning");
        }

        try {
            await window.secretaryHRService.logCalendarEvent(
                title,
                document.getElementById('evtDesc').value,
                new Date(start).toISOString(),
                new Date(end).toISOString(),
                type,
                null,
                color
            );

            showToast("เพิ่มกิจกรรมนัดหมายลงตารางปฏิทินสำเร็จ", "success");
            eventModal.hide();
            if (calendar) calendar.refetchEvents();
        } catch (err) {
            showToast("เพิ่มล้มเหลว: " + err.message, "danger");
        }
    }
</script>
</body>
</html>
