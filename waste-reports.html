<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานรายรับค่าขยะ - Smart Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<nav id="sidebar"></nav>
<div id="content">
    <div id="top-navbar" class="top-navbar" data-title="รายงานรายรับค่าธรรมเนียมขยะ"></div>
    <div class="page-content">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1"><i class="fa-solid fa-chart-bar text-info me-2"></i>รายงานรายรับ</h4>
                <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0" style="font-size:0.8rem;">
                    <li class="breadcrumb-item"><a href="dashboard.html" class="text-decoration-none">แดชบอร์ด</a></li>
                    <li class="breadcrumb-item"><a href="finance.html" class="text-decoration-none">กองคลัง</a></li>
                    <li class="breadcrumb-item"><a href="waste-dashboard.html" class="text-decoration-none">ค่าธรรมเนียมขยะ</a></li>
                    <li class="breadcrumb-item active">รายงานรายรับ</li>
                </ol></nav>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-success" onclick="showToast('Export Excel สำเร็จ','success')"><i class="fa-solid fa-file-excel me-1"></i>Excel</button>
                <button class="btn btn-sm btn-outline-danger" onclick="showToast('Export PDF สำเร็จ','success')"><i class="fa-solid fa-file-pdf me-1"></i>PDF</button>
            </div>
        </div>

        <!-- Report Tabs -->
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item"><a class="nav-link active fw-semibold" data-bs-toggle="tab" href="#tabDaily">รายวัน</a></li>
            <li class="nav-item"><a class="nav-link fw-semibold" data-bs-toggle="tab" href="#tabMonthly">รายเดือน</a></li>
            <li class="nav-item"><a class="nav-link fw-semibold" data-bs-toggle="tab" href="#tabYearly">รายปี</a></li>
        </ul>

        <div class="tab-content">
            <!-- Daily -->
            <div class="tab-pane fade show active" id="tabDaily">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                    <h5 class="fw-bold mb-0">สรุปรายวัน</h5>
                    <div class="d-flex align-items-center gap-2">
                        <label class="form-label mb-0 text-muted" style="white-space: nowrap;">เลือกวันที่:</label>
                        <input type="date" id="filterDate" class="form-control form-control-sm" style="width: 150px;" onchange="renderReports()">
                    </div>
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-6 col-lg-3"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">จำนวนผู้ชำระวันนี้</div><div class="kpi-value text-primary" id="dailyCount">-</div></div><div class="kpi-icon bg-primary bg-opacity-10 text-primary"><i class="fa-solid fa-users"></i></div></div></div></div>
                    <div class="col-6 col-lg-3"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">ยอดรวมวันนี้</div><div class="kpi-value text-success" id="dailyTotal">-</div></div><div class="kpi-icon bg-success bg-opacity-10 text-success"><i class="fa-solid fa-coins"></i></div></div></div></div>
                    <div class="col-6 col-lg-3"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">เงินสด</div><div class="kpi-value" id="dailyCash">-</div></div><div class="kpi-icon bg-warning bg-opacity-10 text-warning"><i class="fa-solid fa-money-bill-wave"></i></div></div></div></div>
                    <div class="col-6 col-lg-3"><div class="kpi-card"><div class="d-flex justify-content-between align-items-start"><div><div class="kpi-label mb-1">โอน/QR</div><div class="kpi-value" id="dailyTransfer">-</div></div><div class="kpi-icon bg-info bg-opacity-10 text-info"><i class="fa-solid fa-qrcode"></i></div></div></div></div>
                </div>
                <div class="card"><div class="card-body p-0"><div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr><th class="ps-4">ใบเสร็จ</th><th>ผู้ชำระ</th><th class="text-end">จำนวนเงิน</th><th>ช่องทาง</th><th>เวลา</th><th class="pe-4 text-center">จัดการ</th></tr></thead>
                        <tbody id="dailyTableBody"></tbody>
                    </table>
                </div></div></div>
            </div>

            <!-- Monthly -->
            <div class="tab-pane fade" id="tabMonthly">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                    <h5 class="fw-bold mb-0">สรุปรายเดือน</h5>
                    <div class="d-flex align-items-center gap-2">
                        <label class="form-label mb-0 text-muted" style="white-space: nowrap;">ปีงบประมาณ:</label>
                        <select id="filterYear" class="form-select form-select-sm" style="width: 120px;" onchange="renderReports()">
                            <option value="2567">2567</option>
                            <option value="2568">2568</option>
                            <option value="2569">2569</option>
                        </select>
                    </div>
                </div>
                <div class="card mb-4"><div class="card-body"><canvas id="monthlyChart" height="300"></canvas></div></div>
                <div class="card"><div class="card-body p-0"><div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr><th class="ps-4">เดือน</th><th>จำนวนผู้ชำระ</th><th class="text-end">ยอดรวม</th><th>เงินสด</th><th>โอน/QR</th></tr></thead>
                        <tbody id="monthlyTableBody"></tbody>
                    </table>
                </div></div></div>
            </div>

            <!-- Yearly -->
            <div class="tab-pane fade" id="tabYearly">
                <div class="card mb-4"><div class="card-body"><canvas id="yearlyChart" height="300"></canvas></div></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/waste.js"></script>
<script src="assets/js/waste-payment.js"></script>
<script src="assets/js/responsive.js"></script>
<script src="assets/js/waste-receipt.js"></script>
<script>
var monthlyChartInstance = null;
var yearlyChartInstance = null;

document.addEventListener('DOMContentLoaded', function() {
    initWasteData();
    
    // Set default values for filters
    var today = new Date();
    document.getElementById('filterDate').value = today.toISOString().split('T')[0];
    
    var currentYear = today.getMonth() >= 9 ? today.getFullYear() + 543 + 1 : today.getFullYear() + 543;
    var yearSelect = document.getElementById('filterYear');
    var yearOptions = Array.from(yearSelect.options).map(function(o){ return o.value; });
    if (!yearOptions.includes(String(currentYear))) {
        var opt = document.createElement('option');
        opt.value = currentYear; opt.text = currentYear;
        yearSelect.appendChild(opt);
    }
    yearSelect.value = currentYear;

    renderReports();
});

function renderReports() {
    var payments = getWastePayments();
    
    // 1. Daily Report
    var filterDate = document.getElementById('filterDate').value;
    var todayPayments = payments.filter(function(p){ return p.date === filterDate; });

    document.getElementById('dailyCount').textContent = todayPayments.length;
    document.getElementById('dailyTotal').textContent = '฿' + formatMoney(todayPayments.reduce(function(s,p){return s+p.amount;},0));
    document.getElementById('dailyCash').textContent = '฿' + formatMoney(todayPayments.filter(function(p){return p.method==='เงินสด';}).reduce(function(s,p){return s+p.amount;},0));
    document.getElementById('dailyTransfer').textContent = '฿' + formatMoney(todayPayments.filter(function(p){return p.method!=='เงินสด';}).reduce(function(s,p){return s+p.amount;},0));

    var rows = '';
    if (todayPayments.length) {
        todayPayments.forEach(function(p) {
            rows += '<tr>' +
                '<td class="ps-4 fw-semibold text-xs">' + p.receipt_no + '</td>' +
                '<td>' + p.customer_name + '</td>' +
                '<td class="text-end fw-semibold">฿' + formatMoneyDecimal(p.amount) + '</td>' +
                '<td class="text-xs">' + p.method + '</td>' +
                '<td class="text-xs text-muted">' + (p.time||'') + '</td>' +
                '<td class="pe-4 text-center">' +
                    '<button class="btn btn-xs btn-outline-info me-1" onclick="viewReceipt(\'' + p.id + '\')" title="ดูใบเสร็จ"><i class="fa-solid fa-eye"></i></button>' +
                    '<button class="btn btn-xs btn-outline-primary me-1" onclick="printReceiptA4(getWastePayments().find(function(x){return x.id===\'' + p.id + '\'}))" title="พิมพ์"><i class="fa-solid fa-print"></i></button>' +
                    '<button class="btn btn-xs btn-outline-success" onclick="saveReceiptToDrive(\'' + p.id + '\')" title="บันทึก Drive"><i class="fa-brands fa-google-drive"></i></button>' +
                '</td></tr>';
        });
    } else {
        rows = '<tr><td colspan="6" class="text-center py-4 text-muted">ยังไม่มีรายการสำหรับวันที่เลือก</td></tr>';
    }
    document.getElementById('dailyTableBody').innerHTML = rows;

    // 2. Monthly Report
    var filterYear = document.getElementById('filterYear').value;
    // Filter payments for the selected fiscal year
    var monthlyPayments = payments.filter(function(p) {
        if (p.fiscal_year) return String(p.fiscal_year) === filterYear;
        // Fallback: calculate fiscal year from date
        var d = new Date(p.date);
        var fy = d.getMonth() >= 9 ? d.getFullYear() + 543 + 1 : d.getFullYear() + 543;
        return String(fy) === filterYear;
    });

    var mRows = '';
    var revData = [];
    WASTE_MONTHS.forEach(function(m, i) {
        var mp = monthlyPayments.filter(function(p){
            var d = new Date(p.date);
            var mi = d.getMonth() >= 9 ? d.getMonth() - 9 : d.getMonth() + 3;
            return mi === i;
        });
        var monthTotal = mp.reduce(function(s,p){return s+p.amount;},0);
        revData.push(monthTotal);
        
        mRows += '<tr><td class="ps-4 fw-semibold">' + m + '</td><td>' + mp.length + '</td>' +
            '<td class="text-end fw-semibold">฿' + formatMoney(monthTotal) + '</td>' +
            '<td class="text-xs">฿' + formatMoney(mp.filter(function(p){return p.method==='เงินสด';}).reduce(function(s,p){return s+p.amount;},0)) + '</td>' +
            '<td class="text-xs">฿' + formatMoney(mp.filter(function(p){return p.method!=='เงินสด';}).reduce(function(s,p){return s+p.amount;},0)) + '</td></tr>';
    });
    document.getElementById('monthlyTableBody').innerHTML = mRows;

    if (monthlyChartInstance) monthlyChartInstance.destroy();
    monthlyChartInstance = new Chart(document.getElementById('monthlyChart'), {
        type:'bar', data:{labels:WASTE_MONTHS, datasets:[{label:'รายรับปี ' + filterYear + ' (บาท)',data:revData,backgroundColor:'rgba(6,148,162,0.7)',borderRadius:6}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return '฿'+formatMoney(v);}}}}}
    });

    // 3. Yearly Report
    // Group all payments by fiscal year
    var yearlyTotals = {};
    payments.forEach(function(p) {
        var fy = p.fiscal_year;
        if (!fy) {
            var d = new Date(p.date);
            fy = String(d.getMonth() >= 9 ? d.getFullYear() + 543 + 1 : d.getFullYear() + 543);
        }
        if (!yearlyTotals[fy]) yearlyTotals[fy] = 0;
        yearlyTotals[fy] += p.amount;
    });
    
    // Create an array of years sorted
    var allYears = Object.keys(yearlyTotals).sort();
    if (allYears.length === 0) {
        allYears = [currentYear];
        yearlyTotals[currentYear] = 0;
    }
    var yearlyData = allYears.map(function(y) { return yearlyTotals[y]; });

    if (yearlyChartInstance) yearlyChartInstance.destroy();
    yearlyChartInstance = new Chart(document.getElementById('yearlyChart'), {
        type:'bar', data:{labels:allYears, datasets:[{label:'รายรับ (บาท)',data:yearlyData,backgroundColor:'rgba(26,86,219,0.6)',borderRadius:8}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return '฿'+formatMoney(v);}}}}}
    });
}
</script>
</body>
</html>
